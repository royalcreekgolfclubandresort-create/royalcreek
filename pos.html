<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>POS · Royal Creek</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#123a2a;--green-2:#1b5e3f;--gold:#c9a24b;--gold-soft:#e6d29a;--cream:#f6f4ee;
    --card:#fff;--ink:#20261f;--muted:#6b7268;--line:#e2ddcf;--danger:#a3352d;--ok:#1b7a4a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--cream);font-size:15px;line-height:1.4}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:inherit}
  .hidden{display:none!important}
  .crest{width:38px;height:38px;border-radius:11px;background:#0d2b1f;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;flex:none}

  /* login / venue */
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(120% 90% at 50% -10%,#16482f,var(--green) 55%,#0d2b1f)}
  .lcard{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:26px 22px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .fld{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  .staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .sbtn{padding:14px 12px;border:1.5px solid var(--line);border-radius:13px;background:#fbfaf5;text-align:left}
  .sbtn .nm{font-weight:600}.sbtn .nk{font-size:13px;color:var(--muted)}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0 18px}.pd{width:15px;height:15px;border-radius:50%;border:2px solid var(--line)}.pd.f{background:var(--green-2);border-color:var(--green-2)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pad button{height:56px;border-radius:13px;background:#fbfaf5;border:1.5px solid var(--line);font-size:22px;font-weight:600}
  .link{display:block;text-align:center;margin-top:14px;color:var(--green-2);font-weight:600;font-size:14px}
  .msg{margin-top:12px;text-align:center;font-size:14px;min-height:20px;color:var(--danger)}
  .vbtn{width:100%;padding:15px;border:1.5px solid var(--line);border-radius:13px;background:#fbfaf5;text-align:left;margin-bottom:10px;font-weight:600}

  /* shell */
  #app{display:flex;min-height:100vh}
  .side{width:200px;background:var(--green);color:#fff;display:flex;flex-direction:column;flex:none;position:sticky;top:0;height:100vh}
  .side .logo{display:flex;align-items:center;gap:10px;padding:16px 16px 14px}
  .side .logo b{font-size:15px}.side .logo small{display:block;font-size:11px;color:var(--gold-soft)}
  .nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:11px;padding:12px 12px;border-radius:10px;color:#dfe9e2;font-weight:600;font-size:14px;text-align:left;width:100%}
  .nav button .ic{font-size:17px}
  .nav button.on{background:rgba(255,255,255,.14);color:#fff}
  .side .u{padding:12px 14px;border-top:1px solid rgba(255,255,255,.12);font-size:13px;color:var(--gold-soft)}
  .side .u b{display:block;color:#fff}
  .side .u button{margin-top:8px;border:1px solid rgba(255,255,255,.3);border-radius:9px;padding:6px 10px;color:#fff;font-size:12px;font-weight:600}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .hbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:6}
  .hbar h2{margin:0;font-size:17px}.hbar .vn{margin-left:auto;font-size:13px;color:var(--muted)}
  .content{flex:1;min-height:0}

  @media(max-width:820px){
    #app{flex-direction:column}
    .side{width:auto;height:auto;flex-direction:row;align-items:center;position:sticky;top:0;z-index:9;overflow-x:auto}
    .side .logo{padding:10px 12px}.side .logo small{display:none}
    .nav{flex-direction:row;padding:6px;gap:4px;flex:1}
    .nav button{padding:9px 11px;white-space:nowrap;font-size:13px}.nav button .lbl{display:none}
    .nav button .ic{font-size:19px}
    .side .u{display:none}
  }

  /* sell */
  .sell{display:flex;height:calc(100vh - 49px)}
  @media(max-width:820px){.sell{height:auto;display:block}}
  .sellMain{flex:1;min-width:0;overflow:auto;padding:12px 14px 90px}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px}
  .chip{padding:7px 13px;border:1.5px solid var(--line);border-radius:20px;background:var(--card);font-size:13px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .chip.on{border-color:var(--green-2);background:#eef5f0;color:var(--green-2)}
  .qbox{width:100%;height:42px;border:1.5px solid var(--line);border-radius:11px;padding:0 13px;background:var(--card);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:9px}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;position:relative;min-height:98px;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .prod:active{background:#fbfaf5;transform:scale(.98)}
  .prod .em{font-size:26px}.prod .pn{font-size:12px;font-weight:600;line-height:1.15}.prod .pp{font-size:13px;font-weight:700;color:var(--green-2)}
  .prod .st{position:absolute;top:6px;right:8px;font-size:11px;color:var(--muted)}
  .prod.out{opacity:.45}
  .prod .pim{width:42px;height:42px;object-fit:cover;border-radius:8px;margin:0 auto 1px}
  #printArea{position:absolute;left:-9999px;top:0;background:#fff;color:#000;width:800px;padding:16px;font-size:13px}
  #printArea h2{text-align:center;margin:0 0 2px}#printArea .sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  #printArea table{width:100%;border-collapse:collapse}#printArea th,#printArea td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  #printArea th{background:#f0efe8}#printArea .r{text-align:right}#printArea .c{text-align:center}
  #printArea .st-ok{color:#1b7a4a}#printArea .st-low{color:#b8860b}#printArea .st-out{color:#a3352d}
  #printArea .cards{display:flex;gap:10px;margin-bottom:12px}#printArea .cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}#printArea .cards b{display:block;font-size:18px}
  #printArea .billhd{background:#f6f4ee;font-weight:700}

  .cart{width:300px;flex:none;border-left:1px solid var(--line);background:var(--card);display:flex;flex-direction:column}
  .cart .ch{padding:14px 16px 8px;font-weight:700;display:flex}.cart .ch .clr{margin-left:auto;color:var(--danger);font-size:13px;font-weight:600}
  .cart .items{flex:1;overflow:auto;padding:0 16px}
  .cart .empty2{color:var(--muted);text-align:center;padding:40px 10px;font-size:14px}
  .ci{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
  .ci .cn{flex:1;font-size:14px}.ci .cn small{color:var(--muted)}
  .qbtn{width:32px;height:32px;border-radius:8px;background:#eef5f0;color:var(--green-2);font-size:19px;font-weight:700;flex:none}
  .qn{min-width:22px;text-align:center;font-weight:700}
  .cart .foot{padding:14px 16px;border-top:1px solid var(--line)}
  .pay{display:flex;gap:8px;margin-bottom:12px}.pay button{flex:1;height:44px;border-radius:10px;border:1.5px solid var(--line);background:#fbfaf5;font-weight:600}.pay button.on{border-color:var(--green-2);background:#eef5f0;color:var(--green-2)}
  .totrow{display:flex;justify-content:space-between;font-size:19px;font-weight:700;margin-bottom:10px}
  .paybtn{width:100%;height:52px;border-radius:12px;background:var(--green-2);color:#fff;font-weight:700;font-size:16px}.paybtn:disabled{opacity:.5}
  @media(max-width:820px){
    .cart{position:fixed;left:0;right:0;bottom:0;width:auto;max-height:82vh;border-left:none;border-top:1px solid var(--line);border-radius:18px 18px 0 0;transform:translateY(105%);transition:.25s;z-index:20;box-shadow:0 -8px 24px rgba(0,0,0,.2)}
    .cart.open{transform:translateY(0)}
    .cartbar{position:fixed;left:0;right:0;bottom:0;background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:15}
    .cartbar .n{background:var(--gold);color:#3a2e0a;font-weight:700;border-radius:20px;padding:2px 10px}
    .cartbar .tt{margin-left:auto;font-size:18px;font-weight:700}.cartbar .go{background:#fff;color:var(--green);border-radius:10px;padding:9px 15px;font-weight:700}
  }
  @media(min-width:821px){.cartbar{display:none}}

  /* generic lists / sheets */
  .pad2{padding:14px 16px 40px;max-width:760px;margin:0 auto}
  .addbtn{width:100%;height:46px;border-radius:12px;border:1.5px dashed var(--gold);color:#8a6d1f;font-weight:700;margin-bottom:12px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .row .em{font-size:22px}.row .nm{flex:1;min-width:0}.row .nm b{font-weight:600}.row .nm small{color:var(--muted);display:block;font-size:12px}
  .mini{border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;color:var(--green-2)}
  .qbadge{min-width:42px;text-align:center;font-weight:700;padding:4px 8px;border-radius:9px;background:#eef5f0;color:var(--green-2)}.qbadge.low{background:#faece9;color:var(--danger)}
  .sec-h{font-weight:700;font-size:14px;margin:18px 2px 10px}
  .pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
  .pill.pending{background:#f6efd9;color:#8a6d1f}.pill.approved{background:#e4f0e9;color:var(--ok)}.pill.rejected{background:#faece9;color:var(--danger)}
  .stat{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}.stat div{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:36px 20px}

  .ov{position:fixed;inset:0;background:rgba(20,25,20,.55);display:flex;align-items:flex-end;justify-content:center;z-index:30}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow:auto}
  .sheet h3{margin:0 0 14px}.f{margin-bottom:12px}.f label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .in{width:100%;height:48px;border:1.5px solid var(--line);border-radius:11px;padding:0 13px;background:#fbfaf5}.in:focus{outline:none;border-color:var(--green-2);background:#fff}
  .g2{display:flex;gap:10px}.g2>*{flex:1}
  .save{width:100%;height:50px;border-radius:12px;background:var(--green-2);color:#fff;font-weight:700;margin-top:6px}
  .ghost{width:100%;height:44px;border-radius:12px;color:var(--muted);font-weight:600;margin-top:8px}
  .togg{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fbfaf5;margin-bottom:12px}.togg input{width:20px;height:20px}
  .mv{display:flex;gap:10px;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line)}.mv .k{font-weight:600;min-width:48px}.mv .d{margin-left:auto;font-weight:600}.mv .d.pos{color:var(--ok)}.mv .d.neg{color:var(--danger)}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;transition:.25s;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  #rcpt .rc{font-family:'Sarabun',monospace;padding:4px}
  .rc .ch2{text-align:center;font-weight:700;font-size:16px}.rc .cc{text-align:center;font-size:12px;color:var(--muted);margin-bottom:6px}
  .rc .dash{border-top:1px dashed #999;margin:7px 0}.rc .rr{display:flex;justify-content:space-between;font-size:13px;margin:2px 0}
  .rc .tt{display:flex;justify-content:space-between;font-weight:700;font-size:15px}.rc .ty{text-align:center;font-size:12px;color:var(--muted);margin-top:8px}
  .catsec{margin-bottom:14px}.catsec-h{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;margin:8px 2px 9px}.catsec-h .dot{width:10px;height:10px;border-radius:50%}
  @media print{body *{visibility:hidden}.printable,.printable *{visibility:visible}.printable{position:absolute;left:0;top:0;width:100%}.printable.rcptw{width:80mm;max-width:80mm}button{display:none!important}}
.bellw{position:relative;display:inline-flex;margin-left:8px}.bellb{background:none;border:none;font-size:22px;cursor:pointer;position:relative;padding:4px}.bellbadge{position:absolute;top:-2px;right:-4px;background:#e23b3b;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 4px}.bellbadge.on{display:flex}</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="lcard">
    <div class="brand"><div class="crest">RC</div><div><h1>ระบบ POS</h1><p>เลือกชื่อแล้วใส่ PIN</p></div></div>
    <div id="pick"><div class="staff-grid" id="grid"></div></div>
    <div id="pinBox" class="hidden"><label class="fld" id="pinName"></label>
      <div class="pin-dots" id="dots"></div><div class="pad" id="padEl"></div>
      <a class="link" onclick="backPick()">← เลือกคนอื่น</a></div>
    <div id="lmsg" class="msg"></div>
  </div>
</div>

<!-- VENUE PICK -->
<div id="venuePick" class="center hidden"><div class="lcard">
  <div class="brand"><div class="crest">RC</div><div><h1>เลือกร้าน</h1><p id="vpName"></p></div></div>
  <div id="venueBtns"></div></div></div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="side">
    <div class="logo"><div class="crest">RC</div><div><b>ระบบ POS</b><small id="sideVenue">—</small></div></div>
    <nav class="nav">
      <button id="nSell" class="on" onclick="go('sell')"><span class="ic">🛒</span><span class="lbl">ขายสินค้า</span></button>
      <button id="nStock" onclick="go('stock')"><span class="ic">📦</span><span class="lbl">สต็อก</span></button>
      <button id="nReq" onclick="go('req')"><span class="ic">📥</span><span class="lbl">เบิกของ</span></button>
      <button id="nDamage" onclick="go('damage')"><span class="ic">⚠️</span><span class="lbl">ตัดชำรุด</span></button>
      <button id="nReport" onclick="go('report')"><span class="ic">📊</span><span class="lbl">ยอดขาย</span></button>
    </nav>
    <div class="u"><span>แคชเชียร์</span><b id="uName">—</b>
      <button onclick="switchVenue()" id="uSwitch">เปลี่ยนร้าน</button>
      <div class="bellw"><button class="bellb" onclick="goNotify()">🔔<span class="bellbadge" id="bellBadge">0</span></button></div><button onclick="location.href='/'">🏠 หน้ารวม</button>
      <button onclick="logout()">ออก</button></div>
  </aside>
  <div class="main">
    <div class="hbar"><h2 id="pageTitle">ขายสินค้า</h2><span class="vn" id="hVenue"></span><button class="mini" style="margin-left:10px" onclick="printPage()">🖨️ พิมพ์/PDF</button></div>
    <div class="content">
      <div id="pgSell" class="sell">
        <div class="sellMain">
          <div class="chips" id="chips"></div>
          <input class="qbox" id="q" placeholder="ค้นหาสินค้า…" oninput="renderGrid()">
          <div id="products"></div>
        </div>
        <aside class="cart" id="cart"></aside>
        <div class="cartbar" id="cartbar" onclick="toggleCart()"><span class="n" id="cbN">0</span><span>รายการ</span><span class="tt" id="cbT">฿0</span><button class="go">ตะกร้า ›</button></div>
      </div>
      <div id="pgStock" class="pad2 hidden"></div>
      <div id="pgReq" class="pad2 hidden"></div>
      <div id="pgDamage" class="pad2 hidden"></div>
      <div id="pgReport" class="pad2 hidden"></div>
    </div>
  </div>
</div>

<div id="modal"></div>
<div id="printArea"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG={SUPABASE_URL:'https://ewfwvykelkamdfsnprwo.supabase.co',SUPABASE_ANON_KEY:'sb_publishable_aPAwNkCIKRTc9FrTW5jeRA_WfnSQqJk'};
const sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
let sel=null,pin='',me=null,venuesAllowed=[],venue=null,cats=[],products=[],cart=[],payMethod='cash',catFilter=null,page='sell';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function baht(n){return '฿'+Number(n||0).toLocaleString('th-TH');}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800);}
function catName(id){const c=cats.find(x=>x.id===id);return c?c.name_th:'ไม่มีหมวด';}
function catColor(id){const c=cats.find(x=>x.id===id);return c&&c.color?c.color:'#9AA0A6';}

/* ===== LOGIN ===== */
async function loadStaff(){
  const {data}=await sb.from('core_staff_directory').select('*').order('full_name_th');
  if(!data||!data.length){$('grid').innerHTML='<div style="color:var(--muted);font-size:14px">ยังไม่มีพนักงานที่ตั้ง PIN</div>';return;}
  $('grid').innerHTML=data.map(s=>`<button class="sbtn" onclick='pick(${JSON.stringify(s)})'><div class="nm">${esc(s.nickname||s.full_name_th)}</div><div class="nk">${esc(s.full_name_th)}</div></button>`).join('');
}
function pick(s){sel=s;pin='';$('pick').classList.add('hidden');$('pinBox').classList.remove('hidden');$('pinName').textContent='PIN ของ '+(s.nickname||s.full_name_th);pad();dots();$('lmsg').textContent='';}
function backPick(){sel=null;pin='';$('pinBox').classList.add('hidden');$('pick').classList.remove('hidden');$('lmsg').textContent='';}
function pad(){$('padEl').innerHTML=['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>k===''?'<span></span>':k==='⌫'?`<button onclick="pinDel()">⌫</button>`:`<button onclick="pinPush('${k}')">${k}</button>`).join('');}
function dots(){$('dots').innerHTML=[0,1,2,3].map(i=>`<div class="pd ${i<pin.length?'f':''}"></div>`).join('');}
function pinPush(d){if(pin.length>=4)return;pin+=d;dots();if(pin.length===4)verify();}
function pinDel(){pin=pin.slice(0,-1);dots();}
async function verify(){
  const {data,error}=await sb.rpc('core_verify_staff_pin',{emp_id:sel.id,pin});
  if(error||!data){$('lmsg').textContent='PIN ไม่ถูกต้อง';pin='';dots();return;}
  if(!await enterFromGrants(data.employee, data.grants||[])) $('lmsg').textContent='บัญชีนี้ไม่มีสิทธิ์เข้า POS';
}
async function enterFromGrants(emp, gs){
  let all=false;const set=new Set();let mgr=false;let own=false;let maxLvl=0;
  gs.forEach(g=>{if(g.module===null){all=true;maxLvl=Math.max(maxLvl,g.level);if(g.level>=80)mgr=true;if(g.level>=100)own=true;}
    if(g.module==='pos'){maxLvl=Math.max(maxLvl,g.level);if(g.level>=80)mgr=true;if(g.level>=100)own=true;if(g.venue)set.add(g.venue);else all=true;}});
  me={id:emp.id,name:emp.nickname||emp.name,isManager:mgr,isOwner:own,canReport:maxLvl>=40};
  try{sessionStorage.setItem('ryc_staff',JSON.stringify({id:emp.id,name:me.name}));}catch(e){}
  const {data:vs}=await sb.from('core_venues').select('code,name_th').in('venue_type',['convenience','hotel']).order('sort_order');
  venuesAllowed=(vs||[]).filter(v=>all||set.has(v.code));
  if(!venuesAllowed.length)return false;
  $('login').classList.add('hidden');
  if(venuesAllowed.length===1){venue=venuesAllowed[0];start();}else showVenuePick();
  return true;
}

async function loadData(){

    sb.from('core_pos_categories').select('*').order('sort_order'),

const TITLES={sell:'ขายสินค้า',stock:'สต็อก',req:'เบิกของจากคลัง',damage:'ตัดชำรุด',report:'ยอดขาย'};
function go(p){
  page=p;['Sell','Stock','Req','Damage','Report'].forEach(n=>{$('n'+n).classList.toggle('on','n'+n==='n'+p.charAt(0).toUpperCase()+p.slice(1));});

  $('pgStock').classList.toggle('hidden',p!=='stock');
  $('pgReq').classList.toggle('hidden',p!=='req');
  $('pgDamage').classList.toggle('hidden',p!=='damage');
  $('pgReport').classList.toggle('hidden',p!=='report');
  $('cartbar').style.display=(p==='sell')?'':'none';

/* ===== SELL ===== */
function renderChips(){
  const used=[...new Set(products.map(p=>p.category_id))];
  const list=cats.filter(c=>used.includes(c.id));
  $('chips').innerHTML=`<button class="chip ${catFilter===null?'on':''}" onclick="setCat(null)">ทั้งหมด</button>`+
    list.map(c=>`<button class="chip ${catFilter===c.id?'on':''}" onclick="setCat(${c.id})"><span class="dot" style="background:${c.color||'#9AA0A6'}"></span>${esc(c.name_th)}</button>`).join('')+
    (products.some(p=>!p.category_id)?`<button class="chip ${catFilter==='none'?'on':''}" onclick="setCat('none')">ไม่มีหมวด</button>`:'');
}
function setCat(id){catFilter=id;renderChips();renderGrid();}
function card(p){const out=p.track_stock&&p.qty<=0;
  const vis=p.image_url?`<img class="pim" src="${esc(p.image_url)}" alt="">`:`<span class="em">${esc(p.emoji||'📦')}</span>`;
  return `<button class="prod ${out?'out':''}" onclick='addCart(${p.product_id})'>${p.track_stock?`<span class="st">${p.qty}</span>`:''}${vis}<span class="pn">${esc(p.name_th)}</span><span class="pp">${baht(p.price)}</span></button>`;}
function renderGrid(){
  const q=($('q').value||'').trim().toLowerCase();
  let list=products.filter(p=>!q||(p.name_th||'').toLowerCase().includes(q));
  // เลือกหมวดเดียว → กริดแบน
  if(catFilter==='none'){list=list.filter(p=>!p.category_id);}
  else if(catFilter!==null){list=list.filter(p=>p.category_id===catFilter);}
  if(catFilter!==null){
    $('products').innerHTML=list.length?`<div class="grid">${list.map(card).join('')}</div>`:'<div class="empty">ไม่พบสินค้า</div>';
    return;
  }
  // ทั้งหมด → จัดกลุ่มทีละหมวด
  if(!list.length){$('products').innerHTML='<div class="empty" style="grid-column:1/-1">ไม่พบสินค้า</div>';return;}
  let html='';
  cats.forEach(c=>{
    const g=list.filter(p=>p.category_id===c.id);
    if(!g.length)return;
    html+=`<div class="catsec"><div class="catsec-h"><span class="dot" style="background:${c.color||'#9AA0A6'}"></span>${esc(c.name_th)} <span style="color:var(--muted);font-weight:500">(${g.length})</span></div><div class="grid">${g.map(card).join('')}</div></div>`;
  });
  const none=list.filter(p=>!p.category_id);
  if(none.length)html+=`<div class="catsec"><div class="catsec-h"><span class="dot" style="background:#9AA0A6"></span>ไม่มีหมวด <span style="color:var(--muted);font-weight:500">(${none.length})</span></div><div class="grid">${none.map(card).join('')}</div></div>`;
  $('products').innerHTML=html;
}
function addCart(pid){const p=products.find(x=>x.product_id===pid);if(!p)return;const c=cart.find(x=>x.product_id===pid);if(c)c.qty++;else cart.push({product_id:pid,name:p.name_th,emoji:p.emoji,price:p.price,qty:1});renderCart();toast(p.name_th);}
function renderCart(){
  const total=cart.reduce((s,x)=>s+x.qty*x.price,0),n=cart.reduce((s,x)=>s+x.qty,0);
  $('cbN').textContent=n;$('cbT').textContent=baht(total);
  const items=cart.length?cart.map((c,i)=>`<div class="ci"><div class="cn">${esc(c.emoji||'')} ${esc(c.name)}<br><small>${baht(c.price)}</small></div><button class="qbtn" onclick="chQty(${i},-1)">−</button><span class="qn">${c.qty}</span><button class="qbtn" onclick="chQty(${i},1)">+</button><span style="min-width:56px;text-align:right;font-weight:600">${baht(c.price*c.qty)}</span></div>`).join(''):'<div class="empty2">ยังไม่มีสินค้าในบิล</div>';
  $('cart').innerHTML=`<div class="ch">บิลปัจจุบัน${cart.length?`<span class="clr" onclick="clearCart()">ล้างบิล</span>`:''}</div>
    <div class="items">${items}</div>
    <div class="foot">
      <div class="pay"><button class="${payMethod==='cash'?'on':''}" onclick="setPay('cash')">เงินสด</button><button class="${payMethod==='transfer'?'on':''}" onclick="setPay('transfer')">โอน</button></div>
      <div class="totrow" style="align-items:center"><span>🏷 ส่วนลด (บาท)</span><input id="dcAmt" type="number" inputmode="decimal" placeholder="0" style="width:84px;height:38px;border:1px solid var(--line);border-radius:9px;padding:0 8px;font-family:inherit;text-align:right"></div>
      <div class="totrow"><span>รวม</span><span>${baht(total)}</span></div>
      <button class="paybtn" ${cart.length?'':'disabled'} onclick="checkout()">เก็บเงิน ${baht(total)}</button>
    </div>`;
}
function chQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderCart();}
function setPay(m){payMethod=m;renderCart();}
function clearCart(){cart=[];renderCart();}
function toggleCart(){if(cart.length)$('cart').classList.toggle('open');}
async function checkout(){
  if(!cart.length)return;
  const items=cart.map(c=>({product_id:c.product_id,qty:c.qty}));
  const _d=Number((document.getElementById('dcAmt')||{}).value)||0;
  const {data,error}=await sb.rpc('core_pos_checkout',{p_emp:me.id,p_venue:venue.code,p_items:items,p_pay:payMethod,p_note:null,p_discount:_d});

  cart=[];$('cart').classList.remove('open');
  showReceipt({bill_no:data.bill_no,total:data.total,pay:data.pay,items:data.items,at:new Date(),by:me.name});
  await loadData();renderGrid();renderCart();
}

async function doSetStock(pid){

  const {error}=await sb.rpc('core_pos_set_stock_owner',{p_emp:me.id,p_venue:venue.code,p_product:pid,p_qty:q,p_reason:'เจ้าของปรับสต็อก'});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  closeModal();toast('ตั้งสต็อกแล้ว');await loadData();renderStock();
}

async function submitCount(){
  const items=Object.entries(window._cnt||{}).filter(([k,v])=>v!=='').map(([k,v])=>({product_id:Number(k),qty:Number(v)}));
  if(!items.length){toast('ยังไม่ได้กรอกยอดนับ');return;}

async function stockHist(pid,name){
  const vcode=venue.code;
  const {data,error}=await sb.rpc('core_pos_product_history',{p_emp:me.id,p_venue:vcode,p_product:pid});
  if(error){toast(error.message||'โหลดไม่สำเร็จ');return;}
  const list=data||[];
  const kt={init:'สร้าง',restock:'เติม',adjust:'ปรับ',damage:'ชำรุด',sale:'ขาย',void:'คืน/ยกเลิก',requisition:'รับเบิก',issue:'จ่ายออก',purchase:'ซื้อเข้า',transfer:'ย้าย'};
  const days=new Map();
  list.forEach(m=>{const d=new Date(m.at).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
    if(!days.has(d))days.set(d,{inn:0,out:0,last:m.after});
    const o=days.get(d);const x=Number(m.delta);
    if(x>0)o.inn+=x;else o.out+=-x;});
  const dayRows=[...days.entries()].map(([d,o])=>`<tr>
    <td style="text-align:left">${d}</td>
    <td style="color:var(--ok);font-weight:${o.inn?'700':'400'}">${o.inn?'+'+o.inn:'–'}</td>
    <td style="color:var(--danger);font-weight:${o.out?'700':'400'}">${o.out?'−'+o.out:'–'}</td>
    <td style="background:#eef5f0"><b>${o.last??''}</b></td></tr>`).join('');
  const detail=list.map(m=>{const dt=new Date(m.at);const pos=Number(m.delta)>=0;
    return `<div class="row"><div class="nm"><b>${kt[m.kind]||m.kind}</b><small>${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(m.by||'')}${m.reason?' · '+esc(m.reason):''}</small></div><b style="color:${pos?'var(--ok)':'var(--danger)'}">${pos?'+':''}${m.delta} → ${m.after}</b></div>`;}).join('');
  const cur=list.length?list[0].after:'–';
  $('pgStock').innerHTML=`<button class="mini" onclick="renderStock()">← สต็อก</button>
    <div class="sec-h" style="margin-top:12px">🕘 ประวัติ: ${esc(name)} <span style="font-weight:400;color:var(--muted);font-size:13px">· คงเหลือตอนนี้ <b style="color:var(--green-2)">${cur}</b></span></div>
    ${list.length?`<div style="overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:13px;padding:6px">
      <table style="border-collapse:collapse;width:100%;font-size:14px" class="histTb">
        <thead><tr><th style="text-align:left">วันที่</th><th>เข้า</th><th>ออก</th><th style="background:var(--green);color:#fff">คงเหลือ</th></tr></thead>
        <tbody>${dayRows}</tbody></table></div>
      <div style="font-size:12px;color:var(--muted);margin:8px 2px">เข้า = เบิกเข้า/เติม · ออก = ขาย/ชำรุด · “–” = ไม่มี</div>
      <button class="mini" onclick="document.getElementById('shDetail').classList.toggle('hidden')">🔍 ดูละเอียดทีละรายการ</button>
      <div id="shDetail" class="hidden" style="margin-top:8px">${detail}</div>
      <style>.histTb th,.histTb td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:center;white-space:nowrap}.histTb th{background:#f6f4ee;font-size:12px}</style>`
    :'<div class="empty">ยังไม่มีการเคลื่อนไหว</div>'}`;
}
async function doRestock(pid,cur,selfM,addOnly){const q=Number($('rQty').value);
  if(!q){toast('ใส่จำนวน');return;}
  if(q<0&&addOnly&&!me.isOwner){toast('สินค้านี้ลดเองไม่ได้ — ลดได้จากการขายเท่านั้น');return;}
  if(q>0){
    const {error}=await sb.rpc('core_pos_restock_pin',{p_emp:me.id,p_venue:venue.code,p_product:pid,p_delta:q,p_reason:$('rReason').value.trim()||null});
    if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('เติมสต็อกแล้ว +'+q);await loadData();renderStock();return;
  }
  /* เลขติดลบ = ลด (เจ้าของทุกตัว / พนักงานเฉพาะของสดที่ร้านจัดการเอง) */
  if(!me.isOwner&&!selfM){toast('ลดสต็อกได้เฉพาะเจ้าของ');return;}
  const nw=(Number(cur)||0)+q;
  if(nw<0){toast('ลดเกินที่มี (ตอนนี้เหลือ '+cur+')');return;}
  if(!confirm('ลด '+(-q)+' ชิ้น → เหลือ '+nw+'?'))return;
  if(!me.isOwner&&selfM){
    const {error}=await sb.rpc('core_pos_restock_pin',{p_emp:me.id,p_venue:venue.code,p_product:pid,p_delta:q,p_reason:$('rReason').value.trim()||null});
    if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('ลดสต็อกแล้ว '+q);await loadData();renderStock();return;
  }
  const {error}=await sb.rpc('core_pos_set_stock_owner',{p_emp:me.id,p_venue:venue.code,p_product:pid,p_qty:nw,p_reason:$('rReason').value.trim()||('เจ้าของลดสต็อก '+q)});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('ลดสต็อกแล้ว '+q);await loadData();renderStock();}

async function loadReport(){

  const {data,error}=await sb.rpc('core_pos_report',{p_venue:venue.code,p_date:d});
  if(error||!data){$('repBody').innerHTML='<div class="empty">โหลดไม่สำเร็จ</div>';return;}
  const s=data.summary||{count:0,total:0,cash:0,transfer:0};
  const top=(data.top||[]).map((t,i)=>`<div class="row"><span style="color:var(--muted);width:20px">${i+1}</span><div class="nm"><b>${esc(t.name)}</b></div><span style="color:var(--muted)">${t.qty} ชิ้น</span><b style="color:var(--green-2)">${baht(t.total)}</b></div>`).join('')||'<div class="empty">ไม่มีข้อมูล</div>';
  const bills=(data.bills||[]).map(b=>{const dt=new Date(b.at);
    return `<div class="row"><div class="nm" onclick='reprint(${JSON.stringify(b)})' style="cursor:pointer"><b>${esc(b.bill_no)}</b><small>${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(b.by||'')} · ${b.pay==='transfer'?'โอน':'เงินสด'}</small></div><b>${baht(b.total)}</b>
      <button class="mini" onclick='reprint(${JSON.stringify(b)})'>พิมพ์</button>
      ${me.isManager?`<button class="mini" style="color:var(--danger)" onclick='voidBill("${b.id}")'>ลบ</button>`:''}</div>`;}).join('')||'<div class="empty">ยังไม่มีบิล</div>';
  $('repBody').innerHTML=`<div class="stat"><div><b>${s.count}</b><span>บิล</span></div><div><b>${baht(s.total)}</b><span>ยอดขาย</span></div><div><b>${baht(s.cash)}</b><span>เงินสด</span></div><div><b>${baht(s.transfer)}</b><span>โอน</span></div></div>
    <div class="sec-h">สินค้าขายดี</div>${top}<div class="sec-h">บิลทั้งหมด (แตะเพื่อพิมพ์ซ้ำ)</div>${bills}`;
}
async function reprint(b){
  const {data}=await sb.rpc('core_pos_sale_items',{p_sale:b.id});
  const items=(data||[]).map(it=>({name:it.name_th,qty:it.qty,price:it.unit_price,total:it.line_total}));
  showReceipt({bill_no:b.bill_no,total:b.total,pay:b.pay,items:items,at:b.at,by:b.by});
}
async function voidBill(id){
  if(!confirm('ลบบิลนี้? สต็อกจะถูกคืน และยอดขายจะถูกหักออก'))return;
  const {error}=await sb.rpc('core_pos_void_bill',{p_emp:me.id,p_sale:id});
  if(error){toast(error.message||'ลบไม่สำเร็จ');return;}
  toast('ลบบิลแล้ว');await loadData();loadReport();
}

/* พิมพ์แบบเปิดหน้าต่างใหม่ — กันปัญหาหน้าขาวจากการพิมพ์แบบไม่รอของเบราว์เซอร์ */
function printDoc(title,inner,receipt){
  const win=window.open('','_blank');
  if(!win){toast('เบราว์เซอร์บล็อกหน้าต่างพิมพ์ — อนุญาต popup ให้เว็บนี้');return;}
  win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>${title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Sarabun',sans-serif;color:#000;margin:16px;${receipt?'width:76mm;font-size:13px':''}}
  h2{text-align:center;margin:0 0 2px}.sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  th{background:#f0efe8}.r{text-align:right}.c{text-align:center}
  .st-ok{color:#1b7a4a}.st-low{color:#b8860b}.st-out{color:#a3352d}
  .cards{display:flex;gap:10px;margin-bottom:12px}.cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}.cards b{display:block;font-size:18px}
  .billhd{background:#f6f4ee;font-weight:700}
  .rc .ch2{text-align:center;font-weight:700;font-size:16px}.rc .cc{text-align:center;font-size:12px;color:#555;margin-bottom:6px}
  .rc .dash{border-top:1px dashed #999;margin:7px 0}.rc .rr{display:flex;justify-content:space-between;font-size:13px;margin:2px 0}
  .rc .tt{display:flex;justify-content:space-between;font-weight:700;font-size:15px}.rc .ty{text-align:center;font-size:12px;color:#555;margin-top:8px}
  .row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #ddd;font-size:13px}.row .nm{flex:1}.row small{color:#666;display:block;font-size:11px}
  .stat{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}.stat>div{flex:1;min-width:110px;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}.stat b{display:block;font-size:17px}.stat span{font-size:11px;color:#555}
  .sec-h{font-weight:700;margin:14px 0 6px}
  button,.mini,.addbtn,.chips,.g2,input,select{display:none!important}
  </style></head><body>${inner}`+'<scr'+'ipt>'+`window.onload=function(){setTimeout(function(){window.print();},250);}`+'</scr'+'ipt>'+`</body></html>`);
  win.document.close();
}
function printPage(){
  const el=document.querySelector('.content > div:not(.hidden)');
  if(!el)return;
  printDoc(venue.name_th+' · '+$('pageTitle').textContent, `<h2>${esc(venue.name_th)}</h2><div class="sub">${esc($('pageTitle').textContent)} · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>`+el.innerHTML);
}
async function backup(){
  toast('กำลังสำรองข้อมูล…');
  const today=new Date().toISOString().slice(0,10);
  const [p,rep]=await Promise.all([
    sb.from('core_pos_products').select('*'),
    sb.rpc('core_pos_report',{p_venue:venue.code,p_date:today})
  ]);
  const dump={generated_at:new Date().toISOString(),venue:venue.code,categories:cats,
    products:p.data||[],venue_stock:products,today_report:rep.data||null};
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`backup_${venue.code}_${today}.json`;a.click();URL.revokeObjectURL(a.href);
  toast('บันทึกไฟล์สำรองแล้ว');
}

function doPrint(id){const el=$(id);printDoc(document.title,el.innerHTML);el.innerHTML='';}
let reqCart=[],reqCatalog=[];
async function renderReqPage(){
  setTimeout(loadIncoming,0);
  if(!reqCatalog.length){const {data}=await sb.from('core_pos_products').select('id,name_th').eq('active',true).order('name_th');reqCatalog=data||[];}
  const lines=reqCart.map((it,i)=>{const p=reqCatalog.find(x=>x.id===it.pid);return `<div class="row"><div class="nm">${esc(p?p.name_th:'')}</div><input class="in" type="number" inputmode="numeric" value="${it.qty}" style="max-width:90px;margin:0;height:42px" onchange="setReqQty(${i},this.value)"><button class="mini" style="color:var(--danger)" onclick="rmReq(${i})">ลบ</button></div>`;}).join('');
  $('pgReq').innerHTML=`<div class="sec-h">ขอเบิกจากคลังกลาง</div>
    <div id="incomingBox"></div>
    <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px">ขอเบิกจาก</label>
    <select class="in" id="reqSrc"><option value="WH">🏬 คลังกลาง</option>${['K1','K7','K15','RC','DR','HOTEL','7GOLF','REST'].filter(c=>c!==venue.code).map(c=>`<option value="${c}">🏪 สาขา ${c}</option>`).join('')}</select>
    <input class="in" id="reqSearch" placeholder="🔍 ค้นหาสินค้า แล้วแตะเพื่อเพิ่มเข้ารายการ" oninput="reqFilter()" autocomplete="off">
    <div id="reqPick" style="max-height:300px;overflow:auto"></div>
    <button class="addbtn" hidden style="margin-top:8px" onclick="addReq()">＋ เพิ่มรายการ</button>
    ${lines?`<div class="sec-h">รายการที่จะเบิก</div>${lines}<button class="addbtn" style="border:none;background:var(--green-2);color:#fff" onclick="submitReq()">ส่งคำขอเบิก</button>`:''}
    <div class="sec-h">คำขอล่าสุดของร้านนี้</div><div id="reqList"><div class="empty">กำลังโหลด…</div></div>`;
  loadReqList();
}
async function loadIncoming(){
  const box=$('incomingBox');if(!box)return;
  const {data}=await sb.rpc('core_req_incoming',{p_emp:me.id,p_venue:venue.code});
  const list=data||[];
  box.innerHTML=list.length?`<div class="sec-h" style="color:var(--danger)">📥 สาขาอื่นขอเบิกจากร้านเรา (${list.length})</div>`+
    list.map(r=>{const dt=new Date(r.at);
      return `<div style="background:#fff8ec;border:1px solid #ecd9b0;border-radius:13px;padding:12px 14px;margin-bottom:10px">
      <b>${esc(r.from)}</b> <small style="color:var(--muted)">${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${r.note?' · '+esc(r.note):''}</small>
      <div style="font-size:14px;margin:6px 0">${(r.items||[]).map(x=>esc(x.name)+' × '+x.qty).join('<br>')}</div>
      <div style="display:flex;gap:8px"><button class="mini" style="color:var(--ok);font-weight:700" onclick="payIncoming('${r.id}')">✓ จ่ายของ</button>
      <button class="mini" style="color:var(--danger)" onclick="rejectIncoming('${r.id}')">ปฏิเสธ</button></div></div>`;}).join(''):'';
}
async function payIncoming(id){
  if(!confirm('ยืนยันจ่ายของตามคำขอ? สต็อกร้านเราจะถูกตัดไปให้สาขานั้น'))return;
  const {error}=await sb.rpc('core_req_confirm',{p_emp:me.id,p_req:id,p_grants:null});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  toast('จ่ายของแล้ว ✓');await loadData();renderReqPage();
}
async function rejectIncoming(id){
  if(!confirm('ปฏิเสธคำขอนี้?'))return;
  const {error}=await sb.rpc('core_req_reject',{p_emp:me.id,p_req:id});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  toast('ปฏิเสธแล้ว');loadIncoming();
}
function reqFilter(){
  const q=($('reqSearch').value||'').trim().toLowerCase();
  if(!q){$('reqPick').innerHTML='';return;}
  const m=reqCatalog.filter(p=>(p.name_th||'').toLowerCase().includes(q)).slice(0,30);
  $('reqPick').innerHTML=m.length?m.map(p=>`<div class="row" style="cursor:pointer" onclick="addReqPid(${p.id})"><div class="nm">${esc(p.name_th)}</div><span style="color:var(--green-2);font-weight:700">＋</span></div>`).join(''):'<div class="empty" style="padding:14px">ไม่พบสินค้า</div>';
}
function addReqPid(pid){
  const ex=reqCart.find(x=>x.pid===pid);
  if(ex)ex.qty+=1;else reqCart.push({pid,qty:1});
  renderReqPage();toast('เพิ่มแล้ว — แก้จำนวนในรายการได้');
}
function setReqQty(i,v){const q=Number(v);if(q>0)reqCart[i].qty=q;else reqCart.splice(i,1);renderReqPage();}
function addReq(){}
function rmReq(i){reqCart.splice(i,1);renderReqPage();}
async function submitReq(){if(!reqCart.length)return;const items=reqCart.map(x=>({product_id:x.pid,qty:x.qty}));
  const {error}=await sb.rpc('core_req_create',{p_emp:me.id,p_venue:venue.code,p_note:null,p_items:items,p_src:($('reqSrc')&&$('reqSrc').value!=='WH')?$('reqSrc').value:null});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}reqCart=[];toast('ส่งคำขอเบิกแล้ว รอสโตร์อนุมัติ');renderReqPage();}
async function loadReqList(){const {data}=await sb.rpc('core_req_list',{p_status:null});
  const mine=(data||[]).filter(r=>r.venue_code===venue.code).slice(0,15);
  $('reqList').innerHTML=mine.length?mine.map(r=>{const dt=new Date(r.created_at);const st=r.status==='pending'?'รออนุมัติ':r.status==='confirmed'?'จ่ายแล้ว':'ปฏิเสธ';
    const rowsHtml=r.items.map(it=>{const qty=(r.status==='confirmed'?it.granted:it.requested);
      const short=(r.status==='pending')&&(it.wh_qty!=null)&&(it.wh_qty<it.requested);
      const stk=(it.wh_qty==null)?'':(short?` · <span style="color:var(--danger)">คลังมี ${it.wh_qty} ไม่พอ</span>`:` · คลังมี ${it.wh_qty}`);
      return `<div class="row" style="padding:9px 0"><div class="nm"><b>${esc(it.name)}</b><small style="color:var(--muted);display:block">ขอ ${it.requested}${stk}</small></div><span style="min-width:44px;height:40px;border:1px solid var(--line);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">${qty}</span></div>`;}).join('');
    const srcTxt=r.src_venue?('🏪 สาขา '+r.src_venue):'🏬 คลังกลาง';
    const recv=r.status==='confirmed'?(
      r.receive_status==='ok'?`<div style="font-size:12px;color:var(--ok);margin-top:4px">✓ ตรวจรับถูกต้องแล้ว</div>`
      :r.receive_status==='issue'?`<div style="font-size:12px;color:var(--danger);margin-top:4px">⚠️ แจ้งปัญหาแล้ว: ${esc(r.receive_note||'')}</div>`
      :`<div style="display:flex;gap:8px;margin-top:8px"><button class="mini" style="color:var(--ok)" onclick="recvOk('${r.id}')">✓ ได้รับของถูกต้อง</button><button class="mini" style="color:var(--danger)" onclick="recvIssue('${r.id}')">⚠️ แจ้งปัญหา</button></div>`):'';
    return `<div style="background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
        <div><b>ขอจาก ${srcTxt}</b><small style="color:var(--muted);display:block">${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</small></div>
        <span class="pill ${r.status==='pending'?'pending':r.status==='confirmed'?'approved':'rejected'}">${st}</span></div>
      ${rowsHtml}${recv}</div>`;}).join(''):'<div class="empty">ยังไม่มีคำขอ</div>';
}
async function recvOk(reqId){
  if(!confirm('ยืนยันว่าได้รับของครบถูกต้อง?'))return;
  const {error}=await sb.rpc('core_req_receive',{p_emp:me.id,p_req:reqId,p_ok:true,p_note:null,p_photo:null});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}toast('ยืนยันรับของแล้ว ✓');loadReqList();
}
function recvIssue(reqId){
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>⚠️ แจ้งปัญหาการรับของ</h3>
    <div class="f"><label>ปัญหาที่พบ *</label><input class="in" id="riNote" placeholder="เช่น ได้ไม่ครบ / ของแตก / ผิดรายการ"></div>
    <div class="f"><label>รูปถ่าย (ถ้ามี)</label><input class="in" id="riPhoto" type="file" accept="image/*" capture="environment"></div>
    <button class="save" onclick="sendIssue('${reqId}')">ส่งแจ้ง Warehouse</button>
    <button class="ghost" onclick="closeModal()">ยกเลิก</button></div></div>`;
}
async function sendIssue(reqId){
  const note=$('riNote').value.trim();if(!note){toast('ระบุปัญหาที่พบ');return;}
  let photo=null;const f=$('riPhoto').files&&$('riPhoto').files[0];
  if(f){const path='r'+Date.now()+'.jpg';
    const {error:ue}=await sb.storage.from('req-photos').upload(path,f,{contentType:f.type||'image/jpeg'});
    if(!ue)photo=sb.storage.from('req-photos').getPublicUrl(path).data.publicUrl;}
  const {error}=await sb.rpc('core_req_receive',{p_emp:me.id,p_req:reqId,p_ok:false,p_note:note,p_photo:photo});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  closeModal();toast('แจ้งปัญหาไปที่ Warehouse แล้ว');loadReqList();
}
function statusTh(p){if(!p.track_stock)return['-','st-ok'];if(p.qty<=0)return['หมด','st-out'];if(p.qty<=3)return['ใกล้หมด','st-low'];return['ปกติ','st-ok'];}
function printStockReport(){
  const rows=products.map((p,i)=>{const a=statusTh(p);
    return `<tr><td class="c">${i+1}</td><td>${esc(p.emoji||'')} ${esc(p.name_th)}</td><td class="r">${baht(p.price)}</td><td class="r">${p.track_stock?p.qty:'-'}</td><td class="${a[1]}">${a[0]}</td></tr>`;}).join('');
  $('printArea').innerHTML=`<h2>${esc(venue.name_th)}</h2><div class="sub">รายงานสต็อกสินค้า · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <table><thead><tr><th class="c">#</th><th>สินค้า</th><th class="r">ราคา</th><th class="r">สต็อก</th><th>สถานะ</th></tr></thead><tbody>${rows}</tbody></table>`;
  doPrint('printArea');
}
async function printSalesReport(){
  const d=$('rDate').value;toast('กำลังสร้างรายงาน…');
  const {data,error}=await sb.rpc('core_pos_report_full',{p_venue:venue.code,p_date:d});
  if(error||!data){toast('โหลดไม่สำเร็จ');return;}
  const s=data.summary||{};let body='';
  (data.bills||[]).forEach((b,i)=>{const dt=new Date(b.at);
    body+=`<tr class="billhd"><td class="c">${i+1}</td><td>${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</td><td>บิล ${esc(b.bill_no)} · ${esc(b.by||'')}</td><td class="c">${b.pay==='transfer'?'โอน':'เงินสด'}</td><td class="r">${baht(b.total)}</td></tr>`;
    (b.items||[]).forEach(it=>{body+=`<tr><td></td><td></td><td>— ${esc(it.name)}</td><td class="c">${it.qty} × ${baht(it.unit)}</td><td class="r">${baht(it.total)}</td></tr>`;});
  });
  $('printArea').innerHTML=`<h2>${esc(venue.name_th)}</h2><div class="sub">รายงานยอดขาย ${d} · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <div class="cards"><div><b>${baht(s.gross||s.total)}</b>ยอดขายรวม (ก่อนลด)</div><div><b>${s.count||0}</b>จำนวนบิล</div><div><b>${baht(s.discount||0)}</b>🏷 ส่วนลด</div><div><b>${baht(s.total)}</b>สุทธิ</div><div><b>${baht(s.cash)}</b>เงินสด</div><div><b>${baht(s.transfer)}</b>เงินโอน</div></div>
    <table><thead><tr><th class="c">#</th><th>เวลา</th><th>รายการ</th><th class="c">จำนวน</th><th class="r">ยอด</th></tr></thead><tbody>${body||'<tr><td colspan="5" class="c">ไม่มีบิล</td></tr>'}</tbody></table>`;
  doPrint('printArea');
}

async function enterAsAuth(user){
  const {data:emp}=await sb.from('core_employees').select('id,full_name_th,nickname').eq('auth_user_id',user.id).maybeSingle();
  if(!emp)return false;
  const {data:grants}=await sb.from('core_access_grants').select('module_key, role:core_roles(level), venue:core_venues(code)').eq('employee_id',emp.id);
  const gs=(grants||[]).map(g=>({module:g.module_key,level:g.role?g.role.level:0,venue:g.venue?g.venue.code:null}));
  return await enterFromGrants({id:emp.id,name:emp.full_name_th,nickname:emp.nickname}, gs);
}
async function boot(){
  const {data}=await sb.auth.getSession();
  if(data&&data.session){ if(await enterAsAuth(data.session.user))return; }
  try{const st=JSON.parse(sessionStorage.getItem('ryc_staff')||'null');if(st&&st.id){if(await enterAsStaff(st.id))return;}}catch(e){}
  loadStaff();
}
boot();
</script>
