<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>คลังกลาง · Royal Creek</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#123a2a;--green-2:#1b5e3f;--gold:#c9a24b;--gold-soft:#e6d29a;--cream:#f6f4ee;--card:#fff;--ink:#20261f;--muted:#6b7268;--line:#e2ddcf;--danger:#a3352d;--ok:#1b7a4a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%}
  body{font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--cream);font-size:15px;line-height:1.45}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select{font-family:inherit;font-size:inherit}
  .hidden{display:none!important}
  .crest{width:40px;height:40px;border-radius:11px;background:#0d2b1f;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;flex:none}
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(120% 90% at 50% -10%,#16482f,var(--green) 55%,#0d2b1f)}
  .lcard{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:26px 22px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .fld{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  .staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .sbtn{padding:14px 12px;border:1.5px solid var(--line);border-radius:13px;background:#fbfaf5;text-align:left}.sbtn .nm{font-weight:600}.sbtn .nk{font-size:13px;color:var(--muted)}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0 18px}.pd{width:15px;height:15px;border-radius:50%;border:2px solid var(--line)}.pd.f{background:var(--green-2);border-color:var(--green-2)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pad button{height:56px;border-radius:13px;background:#fbfaf5;border:1.5px solid var(--line);font-size:22px;font-weight:600}
  .link{display:block;text-align:center;margin-top:14px;color:var(--green-2);font-weight:600;font-size:14px}
  .msg{margin-top:12px;text-align:center;font-size:14px;min-height:20px;color:var(--danger)}
  .top{background:var(--green);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
  .top h1{margin:0;font-size:16px}.top .sub{font-size:12px;color:var(--gold-soft)}.top .logout{margin-left:auto;border:1px solid rgba(255,255,255,.35);border-radius:9px;padding:7px 11px;color:#fff;font-weight:600;font-size:13px}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:4}
  .tabs button{flex:1;padding:13px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;font-size:14px}.tabs button.on{color:var(--green-2);border-bottom-color:var(--green-2)}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 40px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:12px}
  .f{margin-bottom:11px}.f label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .in{width:100%;height:46px;border:1.5px solid var(--line);border-radius:10px;padding:0 12px;background:#fbfaf5}.in:focus{outline:none;border-color:var(--green-2);background:#fff}
  .g3{display:grid;grid-template-columns:1fr 70px 80px auto;gap:7px;align-items:center}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}.row .nm{flex:1}.row .nm small{color:var(--muted);display:block;font-size:12px}
  .btn{width:100%;height:48px;border-radius:11px;background:var(--green-2);color:#fff;font-weight:700}.btn:disabled{opacity:.5}
  .mini{border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;font-weight:600;color:var(--green-2)}
  .addl{background:#eef5f0;color:var(--green-2);border-radius:9px;padding:9px 12px;font-weight:700;font-size:13px;white-space:nowrap}
  .del{color:var(--danger);font-weight:700;font-size:18px;padding:0 6px}
  .qbadge{min-width:44px;text-align:center;font-weight:700;padding:4px 8px;border-radius:9px;background:#eef5f0;color:var(--green-2)}.qbadge.low{background:#faece9;color:var(--danger)}
  .pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}.pill.pending{background:#f6efd9;color:#8a6d1f}
  .short{color:var(--danger);font-size:12px;font-weight:600}
  .sec-h{font-weight:700;font-size:14px;margin:6px 2px 10px}.empty{text-align:center;color:var(--muted);padding:34px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;transition:.25s;z-index:40}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .qin{width:64px;height:40px;border:1.5px solid var(--line);border-radius:9px;text-align:center;background:#fbfaf5}
  .g2b{display:flex;gap:8px;margin-bottom:10px}.g2b>*{flex:1}
  .seg{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 4px;font-weight:700;font-size:13.5px;color:var(--muted);background:#fbfaf5}.seg.on{background:var(--green-2);color:#fff;border-color:var(--green-2)}
  .picker{max-height:360px;overflow:auto;margin-bottom:6px}
  .pk{border:1.5px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13px;font-weight:600;background:#fbfaf5}
  .pk:active{background:#eef5f0;border-color:var(--green-2)}
  .pline{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid var(--line)}.pline .nm{flex:1;font-size:14px;min-width:0}
.bellw{position:relative;display:inline-flex;margin-left:8px}.bellb{background:none;border:none;font-size:22px;cursor:pointer;position:relative;padding:4px}.bellbadge{position:absolute;top:-2px;right:-4px;background:#e23b3b;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 4px}.bellbadge.on{display:flex}</style></head><body>

<div id="login" class="center"><div class="lcard">
  <div class="brand"><div class="crest">RC</div><div><h1>คลังกลาง</h1><p>เลือกชื่อแล้วใส่ PIN</p></div></div>
  <div id="pick"><div class="staff-grid" id="grid"></div></div>
  <div id="pinBox" class="hidden"><label class="fld" id="pinName"></label><div class="pin-dots" id="dots"></div><div class="pad" id="padEl"></div><a class="link" onclick="backPick()">← เลือกคนอื่น</a></div>
  <div id="lmsg" class="msg"></div>
</div></div>

<div id="app" class="hidden">
  <div class="top"><div class="crest">RC</div><div><h1>คลังกลาง</h1><div class="sub" id="who"></div></div><div class="bellw" style="margin-left:auto"><button class="bellb" onclick="goNotify()">🔔<span class="bellbadge" id="bellBadge">0</span></button></div><button class="logout" onclick="location.href='/'" style="margin-left:8px">🏠 หน้ารวม</button><button class="logout" onclick="logout()" style="margin-left:8px">ออก</button></div>
  <div class="tabs"><button id="tBuy" class="on" onclick="tab('buy')">ซื้อเข้า</button><button id="tShop" onclick="tab('shop')">ต้องซื้อ</button><button id="tReq" onclick="tab('req')">คำขอเบิก</button><button id="tMove" onclick="tab('move')">ย้ายสาขา</button><button id="tStk" onclick="tab('stk')">สต็อกคลัง</button><button id="tRep" onclick="tab('rep')">รายงาน</button></div>
  <div class="wrap"><div id="vBuy"></div><div id="vShop" class="hidden"></div><div id="vReq" class="hidden"></div><div id="vMove" class="hidden"></div><div id="vStk" class="hidden"></div><div id="vRep" class="hidden"></div></div>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG={SUPABASE_URL:'https://ewfwvykelkamdfsnprwo.supabase.co',SUPABASE_ANON_KEY:'sb_publishable_aPAwNkCIKRTc9FrTW5jeRA_WfnSQqJk'};
const sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
let sel=null,pin='',me=null,prods=[],poItems=[],venuesList=[],fromStock={};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function baht(n){return '฿'+Number(n||0).toLocaleString('th-TH');}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}

async function loadStaff(){const {data}=await sb.from('core_staff_directory').select('*').order('full_name_th');
  if(!data||!data.length){$('grid').innerHTML='<div style="color:var(--muted);font-size:14px">ยังไม่มีพนักงานที่ตั้ง PIN</div>';return;}
  $('grid').innerHTML=data.map(s=>`<button class="sbtn" onclick='pick(${JSON.stringify(s)})'><div class="nm">${esc(s.nickname||s.full_name_th)}</div><div class="nk">${esc(s.full_name_th)}</div></button>`).join('');}
function pick(s){sel=s;pin='';$('pick').classList.add('hidden');$('pinBox').classList.remove('hidden');$('pinName').textContent='PIN ของ '+(s.nickname||s.full_name_th);pad();dots();$('lmsg').textContent='';}
function backPick(){sel=null;pin='';$('pinBox').classList.add('hidden');$('pick').classList.remove('hidden');$('lmsg').textContent='';}
function pad(){$('padEl').innerHTML=['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>k===''?'<span></span>':k==='⌫'?`<button onclick="pinDel()">⌫</button>`:`<button onclick="pinPush('${k}')">${k}</button>`).join('');}
function dots(){$('dots').innerHTML=[0,1,2,3].map(i=>`<div class="pd ${i<pin.length?'f':''}"></div>`).join('');}
function pinPush(d){if(pin.length>=4)return;pin+=d;dots();if(pin.length===4)verify();}
function pinDel(){pin=pin.slice(0,-1);dots();}
async function verify(){
  const {data,error}=await sb.rpc('core_verify_staff_pin',{emp_id:sel.id,pin});
  if(error||!data){$('lmsg').textContent='PIN ไม่ถูกต้อง';pin='';dots();return;}
  if(!await enterEmp(data.employee.id,data.employee.nickname||data.employee.name)){$('lmsg').textContent='บัญชีนี้ไม่มีสิทธิ์คลังกลาง';pin='';dots();}
}
async function enterEmp(id,name){
  const {data:can}=await sb.rpc('core_wh_can',{p_emp:id});
  if(!can)return false;
  const {data:own}=await sb.rpc('core_is_owner_emp',{p_emp:id});
  me={id,name,isOwner:!!own};try{sessionStorage.setItem('ryc_staff',JSON.stringify({id,name}));}catch(e){}start();return true;
}
async function enterAsStaff(id){const {data}=await sb.rpc('core_staff_context',{p_emp:id});if(!data||!data.employee)return false;return await enterEmp(data.employee.id,data.employee.nickname||data.employee.name);}
async function enterAsAuth(user){
  const {data:emp}=await sb.from('core_employees').select('id,full_name_th,nickname').eq('auth_user_id',user.id).maybeSingle();
  if(!emp)return false;
  return await enterEmp(emp.id, emp.nickname||emp.full_name_th);
}
async function pollNotify(){try{const {data}=await sb.rpc('core_notify_wh',{p_emp:me.id});const b=$('bellBadge');if(b){b.textContent=data||0;b.classList.toggle('on',(data||0)>0);}}catch(e){}}
function goNotify(){tab('req');}
setInterval(()=>{if(me)pollNotify();},30000);
async function logout(){await sb.auth.signOut();try{sessionStorage.removeItem('ryc_staff');}catch(e){}location.reload();}

async function start(){
  $('login').classList.add('hidden');$('app').classList.remove('hidden');$('who').textContent=me.name;
  const [p,v]=await Promise.all([
    sb.rpc('core_pos_products_for_venue',{p_venue:'WH'}),
    sb.from('core_venues').select('code,name_th').order('sort_order')
  ]);
  prods=(p.data||[]).map(x=>({id:x.product_id,name_th:x.name_th,emoji:x.emoji,qty:x.qty,price:Number(x.price)||0}));
  venuesList=v.data||[];
  loadLastCosts();
  tab('buy');
}
let lastCosts={};
async function loadLastCosts(){
  const {data}=await sb.rpc('core_wh_last_costs',{p_emp:me.id});
  lastCosts=data||{};
}
async function reloadProds(){
  const {data}=await sb.rpc('core_pos_products_for_venue',{p_venue:'WH'});
  prods=(data||[]).map(x=>({id:x.product_id,name_th:x.name_th,emoji:x.emoji,qty:x.qty}));
}
function tab(t){['Buy','Shop','Req','Move','Stk','Rep'].forEach(x=>{$('t'+x).classList.toggle('on','t'+x==='t'+t.charAt(0).toUpperCase()+t.slice(1));$('v'+x).classList.toggle('hidden','v'+x!=='v'+t.charAt(0).toUpperCase()+t.slice(1));});
  if(t==='buy')renderBuy();if(t==='shop')renderShop();if(t==='req')renderReq();if(t==='move')renderMove();if(t==='stk')renderStk();if(t==='rep')renderRep();}

/* พิมพ์แบบเปิดหน้าต่างใหม่ */
function printDoc(title,inner){
  const win=window.open('','_blank');
  if(!win){toast('เบราว์เซอร์บล็อกหน้าต่างพิมพ์ — อนุญาต popup ให้เว็บนี้');return;}
  win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>${title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Sarabun',sans-serif;color:#000;margin:16px}
  h2{text-align:center;margin:0 0 2px}.sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  th{background:#f0efe8}.r{text-align:right}.c{text-align:center}</style>
  </head><body>${inner}`+'<scr'+'ipt>'+`window.onload=function(){setTimeout(function(){window.print();},250);}`+'</scr'+'ipt>'+`</body></html>`);
  win.document.close();
}

/* ===== ต้องซื้อ ===== */
async function renderShop(){
  $('vShop').innerHTML='<div class="empty">กำลังโหลด…</div>';
  const {data,error}=await sb.rpc('core_wh_shopping',{p_emp:me.id});
  if(error||!data){$('vShop').innerHTML='<div class="empty">'+esc(error?error.message:'โหลดไม่สำเร็จ')+'</div>';return;}
  const low=data.low||[];const short=data.short||[];
  const lowRows=low.map(l=>`<div class="row"><div class="nm">${esc(l.emoji||'📦')} ${esc(l.name)}<small style="color:var(--muted);display:block">จุดสั่งซื้อ ${l.reorder} — แตะตัวเลขเพื่อแก้</small></div>
    <span class="qbadge ${l.qty<=0?'low':''}" style="cursor:pointer" onclick="setReorder(${l.product_id},'${esc(l.name)}',${l.reorder})">เหลือ ${l.qty}</span></div>`).join('');
  const shortRows=short.map(s=>{const dt=new Date(s.at);
    return `<div class="row"><div class="nm">${esc(s.name)}<small style="color:var(--muted);display:block">${esc(s.venue)} ขอแล้วจ่ายไม่ครบ · ${dt.toLocaleDateString('th-TH')}</small></div><b style="color:var(--danger)">ขาด ${s.missing}</b></div>`;}).join('');
  $('vShop').innerHTML=`<div class="card"><div class="sec-h" style="margin-top:0">🛒 คลังต่ำกว่าจุดสั่งซื้อ (${low.length})
      <button class="mini" style="float:right" onclick="printShopping()">🖨️ พิมพ์ลิสต์</button></div>
    ${lowRows||'<div class="empty">ไม่มีของต่ำกว่าจุดสั่งซื้อ 👍</div>'}</div>
    <div class="card"><div class="sec-h" style="margin-top:0">⚠️ เบิกแล้วจ่ายไม่ครบ (14 วันล่าสุด)</div>
    ${shortRows||'<div class="empty">ไม่มี — จ่ายครบทุกคำขอ</div>'}</div>`;
  window._shopData=data;
}
async function setReorder(pid,name,cur){
  const v=prompt('จุดสั่งซื้อของ "'+name+'" (คลังเหลือน้อยกว่าหรือเท่ากับเลขนี้ = ขึ้นในต้องซื้อ)',cur);
  if(v===null)return;const n=Number(v);if(!(n>=0)){toast('ใส่เลข 0 ขึ้นไป');return;}
  const {error}=await sb.rpc('core_wh_set_reorder',{p_emp:me.id,p_product:pid,p_point:n});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}toast('ตั้งจุดสั่งซื้อแล้ว');renderShop();
}
function printShopping(){
  const d=window._shopData;if(!d)return;
  const rows=(d.low||[]).map((l,i)=>`<tr><td class="c">${i+1}</td><td>${esc(l.name)}</td><td class="r">${l.qty}</td><td class="r">${l.reorder}</td><td></td></tr>`).join('');
  const srows=(d.short||[]).map(s=>`<tr><td colspan="2">${esc(s.name)}</td><td colspan="2">${esc(s.venue)}</td><td class="r">ขาด ${s.missing}</td></tr>`).join('');
  printDoc('รายการต้องซื้อ',`<h2>คลังกลาง Royal Creek — รายการต้องซื้อ</h2><div class="sub">พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <table><thead><tr><th class="c">#</th><th>สินค้า</th><th class="r">คลังเหลือ</th><th class="r">จุดสั่งซื้อ</th><th style="width:110px">ซื้อ (จำนวน)</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="c">ไม่มี</td></tr>'}</tbody></table>
    ${srows?`<div class="sub" style="margin-top:12px">เบิกแล้วจ่ายไม่ครบ (14 วัน)</div><table><tbody>${srows}</tbody></table>`:''}`);
}

/* ===== ประวัติใบสั่งซื้อ ===== */
async function loadPoHistory(){
  const el=$('poHist');if(!el)return;
  const {data}=await sb.rpc('core_wh_po_list',{p_emp:me.id,p_limit:30});
  const list=data||[];
  el.innerHTML=list.length?list.map(p=>{const dt=new Date(p.at);
    const cx=p.status==='cancelled';
    return `<div class="row" style="cursor:pointer;${cx?'opacity:.55':''}" onclick='openPO(${JSON.stringify(p).replace(/'/g,"&#39;")})'><div class="nm"><b>${cx?'<span style="color:var(--danger)">[ยกเลิก]</span> ':''}${p.po?esc(p.po):'(ไม่มีเลข PO)'} · ${esc(p.supplier||'ไม่ระบุซัพ')}</b><small style="color:var(--muted);display:block">${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(p.by||'')}</small></div><b style="${cx?'text-decoration:line-through':''}">${baht(p.total)}</b></div>`;}).join(''):'<div class="empty">ยังไม่มีใบสั่งซื้อ</div>';
}
function openPO(p){
  const dt=new Date(p.at);
  const canDel=(me.isOwner||me.canWH)&&p.status!=='cancelled';
  const rows=(p.items||[]).map(it=>`<div class="row"><div class="nm">${esc(it.name)}<small style="color:var(--muted);display:block">${it.qty} × ${baht(it.cost)}</small></div><b>${baht(it.total)}</b>${(canDel&&it.item_id)?`<button class="mini" style="color:var(--danger);margin-left:8px" onclick='delPOItem("${it.item_id}","${esc(it.name)}")'>×</button>`:''}</div>`).join('');
  document.body.insertAdjacentHTML('beforeend',`<div class="ov" id="poOv" onclick="if(event.target===this)this.remove()" style="position:fixed;inset:0;background:rgba(20,25,20,.55);display:flex;align-items:flex-end;justify-content:center;z-index:30"><div class="lcard" style="max-width:520px;border-radius:20px 20px 0 0;max-height:85vh;overflow:auto">
    <h3 style="margin:0 0 4px">${p.po?esc(p.po):'ใบสั่งซื้อ'} · ${esc(p.supplier||'ไม่ระบุซัพ')}</h3>
    <p style="font-size:12px;color:var(--muted);margin:0 0 10px">${dt.toLocaleString('th-TH')} · โดย ${esc(p.by||'')}</p>
    ${rows}<div style="display:flex;justify-content:space-between;font-weight:700;font-size:17px;margin:10px 0"><span>รวม</span><span>${baht(p.total)}</span></div>

  const lines=[...ov.querySelectorAll('.pline[data-line]')].map(el=>({
    line_id:Number(el.dataset.line),
    qty_good:Number(el.querySelector('.rGood').value)||0,
    qty_damaged:Number(el.querySelector('.rDmg').value)||0,
    cost:Number(el.querySelector('.rCost').value)||0
  })).filter(l=>l.qty_good>0||l.qty_damaged>0);
  if(!lines.length){toast('ใส่จำนวนรับจริงอย่างน้อย 1 รายการ');return;}
  const btn=$('rcBtn');btn.disabled=true;btn.textContent='กำลังบันทึก…';
  let photo='';
  const f=($('rcPhoto')&&$('rcPhoto').files)?$('rcPhoto').files[0]:null;
  if(f){const path='po/'+id+'_'+Date.now()+'.jpg';
    const {error:ue}=await sb.storage.from('req-photos').upload(path,f,{contentType:f.type||'image/jpeg'});
    if(!ue)photo=sb.storage.from('req-photos').getPublicUrl(path).data.publicUrl;}
  const {data,error}=await sb.rpc('core_wh_receive',{p_emp:me.id,p_order:id,p_bill_photo:photo,p_note:(($('rcNote')||{}).value||'').trim(),p_lines:lines});

  ov.remove();

/* --- AI อ่านบิล (read-invoice / Haiku) --- */
function fileToJpegB64(f,maxDim){return new Promise((res,rej)=>{
  const img=new Image();const u=URL.createObjectURL(f);
  img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,maxDim/Math.max(w,h));
    w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(u);res(c.toDataURL('image/jpeg',0.82).split(',')[1]);};
  img.onerror=()=>{URL.revokeObjectURL(u);rej(new Error('อ่านรูปไม่ได้'));};
  img.src=u;});}
async function aiReadBill(id){
  const o=recvOrders.find(x=>x.id===id);if(!o)return;
  const f=($('rcPhoto')&&$('rcPhoto').files)?$('rcPhoto').files[0]:null;
  if(!f){toast('ถ่าย/เลือกรูปบิลก่อน แล้วค่อยกดให้ AI อ่าน');return;}
  const btn=$('aiBillBtn');btn.disabled=true;btn.textContent='🤖 AI กำลังอ่านบิล…';
  try{
    const b64=await fileToJpegB64(f,1500);
    const rs=await fetch(CONFIG.SUPABASE_URL+'/functions/v1/read-invoice',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image_b64:b64,media_type:'image/jpeg',order:{po_number:o.po_number,supplier:o.supplier,
        lines:(o.lines||[]).map(l=>({line_id:l.line_id,name:pName(l.product_id),qty_ordered:Number(l.qty_ordered),est_cost:Number(l.est_cost)}))}})});
    const j=await rs.json().catch(()=>({}));
    if(!rs.ok||j.error)throw new Error(j.error||('HTTP '+rs.status));
    const warns=[],extras=[];let filled=0;
    (j.items||[]).forEach(it=>{
      if(it.line_id){
        const el=document.querySelector('.pline[data-line="'+it.line_id+'"]');
        const l=(o.lines||[]).find(x=>x.line_id===Number(it.line_id));
        if(el){
          if(Number(it.qty)>0){el.querySelector('.rGood').value=Number(it.qty);filled++;}
          const up=Number(it.unit_price)||((Number(it.total)&&Number(it.qty))?Number(it.total)/Number(it.qty):0);
          if(up>0)el.querySelector('.rCost').value=Math.round(up*100)/100;
          if(l){
            const remain=Number(l.qty_ordered)-Number(l.qty_received);
            if(Number(it.qty)&&Number(it.qty)!==remain)warns.push(esc(pName(l.product_id))+': บิล '+it.qty+' ≠ ค้างสั่ง '+remain);
            if(up&&Number(l.est_cost)>0&&up>Number(l.est_cost)*1.02)warns.push(esc(pName(l.product_id))+': ราคาบิล '+up.toFixed(2)+' แพงกว่าที่ตกลง '+l.est_cost);
          }
        }
      }else if(it.name_on_bill){extras.push(esc(String(it.name_on_bill))+(Number(it.qty)?' ×'+it.qty:''));}
    });
    $('aiBillBox').innerHTML=`<div style="background:#eef5f0;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:10px;font-size:12.5px">
      <b>🤖 อ่านบิลแล้ว</b> ${j.bill_no?'เลขที่ '+esc(String(j.bill_no))+' · ':''}เติมให้ ${filled} รายการ${Number(j.grand_total)?' · ยอดบิล '+baht(Number(j.grand_total)):''}
      ${warns.length?'<div style="color:var(--danger);margin-top:5px">⚠️ '+warns.join('<br>⚠️ ')+'</div>':''}
      ${extras.length?'<div style="color:#8a6d1f;margin-top:5px">อยู่ในบิลแต่ไม่อยู่ในใบสั่ง: '+extras.join(', ')+'</div>':''}
      <div style="color:var(--muted);margin-top:5px">⚠️ อย่าลืม<b>นับของจริง</b>แล้วแก้ตัวเลขให้ตรงกับของที่มาจริง ก่อนกดยืนยัน</div></div>`;
  }catch(e){toast('AI อ่านไม่สำเร็จ: '+(e.message||e));}
  btn.disabled=false;btn.textContent='🤖 ให้ AI อ่านบิล — เติมตัวเลขให้อัตโนมัติ';
}

async function savePO(){
  if(!poItems.length)return;
  const items=poItems.map(x=>({product_id:x.pid,qty:x.qty,cost:(x.qty>0?(Number(x.total)||0)/x.qty:0)}));
  /* เตือนทุนเพี้ยน ก่อนบันทึก */
  const warns=[];
  items.forEach(it=>{
    const p=prods.find(z=>z.id===it.product_id);if(!p)return;
    const last=Number(lastCosts[String(it.product_id)]);
    if(p.price>0&&it.cost>p.price)
      warns.push(`• ${p.name_th}: ทุน ${it.cost.toFixed(2)} แพงกว่าราคาขาย ${p.price} ❗`);
    else if(last>0&&it.cost>0&&Math.abs(it.cost-last)/last>=0.5)
      warns.push(`• ${p.name_th}: ทุน ${it.cost.toFixed(2)} ต่างจากครั้งก่อน (${last}) ${it.cost>last?'+':''}${Math.round((it.cost-last)/last*100)}%`);
  });
  if(warns.length&&!confirm('⚠️ ตรวจพบทุนน่าสงสัย:\n\n'+warns.join('\n')+'\n\nถ้าคีย์ถูกต้อง (ราคาเปลี่ยนจริง) กดตกลงเพื่อบันทึก\nถ้าคีย์ผิด กดยกเลิกแล้วแก้ตัวเลข'))return;
  const {error}=await sb.rpc('core_wh_purchase',{p_emp:me.id,p_supplier:($('pSup')||{}).value?$('pSup').value.trim():'',p_po:($('pPo')||{}).value?$('pPo').value.trim():'',p_note:null,p_items:items});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  toast('รับของเข้าคลังแล้ว');poItems=[];renderBuy();loadLastCosts();
}

async function cancelReq(id){
  const reason=prompt('เหตุผลที่ยกเลิกใบเบิกนี้?\n(ใบที่จ่ายแล้ว: ระบบจะถอนของออกจากร้านคืนเข้าคลัง)');
  if(reason===null)return;
  if(!reason.trim()){toast('ต้องระบุเหตุผล');return;}
  if(!confirm('ยืนยันยกเลิกใบเบิก? ย้อนกลับไม่ได้'))return;
  const {error}=await sb.rpc('core_req_cancel',{p_emp:me.id,p_req:id,p_reason:reason.trim()});
  if(error){toast(error.message||'ยกเลิกไม่สำเร็จ');return;}
  toast('ยกเลิกใบเบิกแล้ว ✓');renderReq();
}
let grantEdits={};
function setGrant(reqId,itemId,v){grantEdits[itemId]=Number(v)||0;}
async function confirmReq(reqId){
  if(!confirm('ยืนยันจ่ายของตามยอดนี้? ยืนยันแล้วแก้ไม่ได้ และของจะย้ายจากคลังไปร้าน'))return;
  const grants=Object.entries(grantEdits).map(([item_id,qty])=>({item_id,qty}));
  const {error}=await sb.rpc('core_req_confirm',{p_emp:me.id,p_req:reqId,p_grants:grants});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  grantEdits={};toast('จ่ายของแล้ว');renderReq();
}
async function rejectReq(reqId){const {error}=await sb.rpc('core_req_reject',{p_emp:me.id,p_req:reqId});
  if(error){toast('ไม่สำเร็จ');return;}toast('ปฏิเสธแล้ว');renderReq();}

async function trace(pid,name){
  const {data}=await sb.rpc('core_wh_product_trace',{p_emp:me.id,p_product:pid});
  const list=data||[];
  if(!list.length){$('vStk').innerHTML=`<button class="mini" onclick="renderStk()">← สต็อกคลัง</button>
    <div class="sec-h" style="margin-top:12px">เส้นทางสินค้า: ${esc(name)}</div><div class="empty">ยังไม่มีการเคลื่อนไหว</div>`;return;}
  /* ตารางวัน × ร้าน */
  const vens=[...new Set(list.map(m=>m.venue))];
  vens.sort((a,b)=>(a==='คลังกลาง'?-1:b==='คลังกลาง'?1:String(a).localeCompare(String(b),'th')));
  const cur={};list.forEach(m=>{if(!(m.venue in cur))cur[m.venue]=m.after;}); // after ล่าสุดต่อร้าน (list เรียงใหม่→เก่า)
  const days=new Map(),whEnd=new Map();
  list.forEach(m=>{const d=new Date(m.at).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
    if(!days.has(d))days.set(d,{});const o=days.get(d);o[m.venue]=(o[m.venue]||0)+Number(m.delta);
    if(m.venue==='คลังกลาง'&&!whEnd.has(d))whEnd.set(d,m.after);});
  const head=`<tr><th style="text-align:left">วันที่</th>${vens.map(v=>`<th style="${v==='คลังกลาง'?'background:var(--green);color:#fff':''}">${esc(v)}</th>`).join('')}</tr>`;
  const curRow=`<tr style="background:#eef5f0"><td style="text-align:left"><b>คงเหลือตอนนี้</b></td>${vens.map(v=>`<td style="${v==='คลังกลาง'?'background:#dcebe1;font-size:15px':''}"><b>${cur[v]??'–'}</b></td>`).join('')}</tr>`;
  const dayRows=[...days.entries()].map(([d,o])=>`<tr><td style="text-align:left">${d}</td>${vens.map(v=>{const x=o[v];
    if(v==='คลังกลาง'){const end=whEnd.get(d);
      return `<td style="background:#eef5f0;white-space:nowrap"><span style="color:${x>0?'var(--ok)':x<0?'var(--danger)':'var(--muted)'};font-weight:${x?'700':'400'}">${x?(x>0?'+':'')+x:'–'}</span>${end!==undefined?` <span style="color:var(--muted)">→</span> <b>${end}</b>`:''}</td>`;}
    return `<td style="color:${x>0?'var(--ok)':x<0?'var(--danger)':'var(--muted)'};font-weight:${x?'700':'400'}">${x?(x>0?'+':'')+x:'–'}</td>`;}).join('')}</tr>`).join('');
  /* รายละเอียดทีละรายการ (พับไว้) */
  const kt={init:'สร้าง',restock:'เติม',adjust:'ปรับ',damage:'ชำรุด',sale:'ขาย',void:'คืน',requisition:'รับเบิก',issue:'จ่ายออก',purchase:'ซื้อเข้า',transfer:'ย้าย'};
  const detail=list.map(m=>{const dt=new Date(m.at);const pos=Number(m.delta)>=0;
    return `<div class="row"><div class="nm"><b>${kt[m.kind]||m.kind} · ${esc(m.venue)}</b><small>${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(m.by||'')}${m.reason?' · '+esc(m.reason):''}</small></div><b style="color:${pos?'var(--ok)':'var(--danger)'}">${pos?'+':''}${m.delta} → ${m.after}</b></div>`;}).join('');
  $('vStk').innerHTML=`<button class="mini" onclick="renderStk()">← สต็อกคลัง</button>
    <div class="sec-h" style="margin-top:12px">เส้นทางสินค้า: ${esc(name)}</div>
    <div style="overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:6px">
      <table style="border-collapse:collapse;width:100%;font-size:13px;min-width:${120+vens.length*86}px">
        <thead>${head}</thead><tbody>${curRow}${dayRows}</tbody></table></div>
    <div style="font-size:12px;color:var(--muted);margin:8px 2px">ตัวเลข = เข้า(+) / ออก(−) สุทธิของวันนั้น · “–” = ไม่มีเคลื่อนไหว</div>
    <button class="mini" onclick="document.getElementById('trcDetail').classList.toggle('hidden')">🔍 ดูละเอียดทีละรายการ</button>
    <div id="trcDetail" class="hidden" style="margin-top:10px">${detail}</div>
    <style>#vStk table th,#vStk table td{border-bottom:1px solid var(--line);padding:8px 9px;text-align:center;white-space:nowrap}#vStk table th{background:#f6f4ee;font-size:12px}</style>`;
}

    ${iss.map(v=>`<div style="margin-bottom:10px"><b>${esc(v.venue)} (${v.code})</b> — รวม ${v.total_qty} หน่วย
      <div style="font-size:13px;color:var(--muted);margin-top:3px">${v.items.map(i=>esc(i.name)+' ×'+i.qty).join(' · ')}</div></div>`).join('')||'<div class="empty">ไม่มีเบิกออกในช่วงนี้</div>'}</div>`;
  const tfHtml=tf.length?`<div class="card"><div class="sec-h" style="margin-top:0">🔀 ย้ายข้ามสาขา</div>
    ${tf.map(x=>{const dt=new Date(x.at);return `<div class="row"><div class="nm">${esc(x.name)} × ${x.qty}<small>${esc(x.note||'')} · ${dt.toLocaleDateString('th-TH')}</small></div></div>`;}).join('')}</div>`:'';
  $('wBody').innerHTML=lossHtml+rcHtml+issHtml+tfHtml;
}
async function boot(){const {data}=await sb.auth.getSession();if(data&&data.session){if(await enterAsAuth(data.session.user))return;}
  try{const st=JSON.parse(sessionStorage.getItem('ryc_staff')||'null');if(st&&st.id){if(await enterAsStaff(st.id))return;}}catch(e){}
  loadStaff();}
boot();
</script>
