<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>รายงานรวม · Royal Creek</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#123a2a;--green-2:#1b5e3f;--gold:#c9a24b;--gold-soft:#e6d29a;--cream:#f6f4ee;--card:#fff;--ink:#20261f;--muted:#6b7268;--line:#e2ddcf;--danger:#a3352d;--ok:#1b7a4a}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--cream);font-size:15px;line-height:1.45}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}input{font-family:inherit;font-size:inherit}
  .hidden{display:none!important}
  .crest{width:38px;height:38px;border-radius:11px;background:#0d2b1f;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;flex:none}
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(120% 90% at 50% -10%,#16482f,var(--green) 55%,#0d2b1f)}
  .lcard{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:26px 22px;text-align:center}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;text-align:left}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .msg{margin-top:12px;font-size:14px;color:var(--danger)}
  .top{background:var(--green);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
  .top h1{margin:0;font-size:16px}.top .sub{font-size:12px;color:var(--gold-soft)}.top .sp{margin-left:auto;display:flex;gap:8px}
  .top button.t{border:1px solid rgba(255,255,255,.35);border-radius:9px;padding:7px 10px;color:#fff;font-weight:600;font-size:13px}
  .wrap{max-width:820px;margin:0 auto;padding:16px 14px 50px}
  .in{height:46px;border:1.5px solid var(--line);border-radius:10px;padding:0 12px;background:#fff}
  .fld{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .g{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
  .mini{border:1px solid var(--line);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--green-2);background:#fff}
  .quick{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
  .chip{padding:7px 13px;border:1.5px solid var(--line);border-radius:20px;background:#fff;font-size:13px;font-weight:600}
  .chip.on{border-color:var(--green-2);background:#eef5f0;color:var(--green-2)}
  .stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
  .stat div{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;text-align:center}
  .stat b{display:block;font-size:24px}.stat span{font-size:12px;color:var(--muted)}
  .stat .up b{color:var(--ok)}.stat .dn b{color:var(--danger)}
  .sec-h{font-weight:700;font-size:15px;margin:20px 2px 10px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 15px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .row .nm{flex:1}.row .nm small{color:var(--muted);display:block;font-size:12px}
  .empty{text-align:center;color:var(--muted);padding:30px}
  .lineCard{background:#e8f6ec;border:1px solid #bfe3c9;border-radius:14px;padding:14px;margin-bottom:18px}
  .lineCard .hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700;color:#0e7a3d}
  .lineBubble{background:#fff;border:1px solid #d7ecdd;border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:14px;white-space:pre-wrap;line-height:1.65;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .lineBtns{display:flex;gap:8px;margin-top:10px}
  .lineBtns button{flex:1;height:42px;border-radius:10px;font-weight:700;font-size:14px}
  .lineBtns .share{background:#06c755;color:#fff}
  .lineBtns .copy{background:#fff;border:1.5px solid #bfe3c9;color:#0e7a3d}
  #printArea{position:absolute;left:-9999px;top:0;background:#fff;color:#000;width:800px;padding:16px;font-size:13px}
  #printArea h2{text-align:center;margin:0 0 2px}#printArea .sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  #printArea table{width:100%;border-collapse:collapse;margin-bottom:14px}#printArea th,#printArea td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  #printArea th{background:#f0efe8}#printArea .r{text-align:right}
  #printArea .cards{display:flex;gap:10px;margin-bottom:12px}#printArea .cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}#printArea .cards b{display:block;font-size:18px}
  @media print{body *{visibility:hidden}.printable,.printable *{visibility:visible}.printable{position:absolute;left:0;top:0;width:100%}button{display:none!important}}
</style></head><body>

<div id="gate" class="center"><div class="lcard">
  <div class="brand"><div class="crest">RC</div><div><h1>รายงานรวม</h1><p>เฉพาะเจ้าของกิจการ</p></div></div>
  <div id="gmsg">กำลังตรวจสอบสิทธิ์…</div>
  <div class="msg" id="gerr"></div>
  <button class="mini" style="margin-top:14px" onclick="location.href='/'">← กลับหน้ารวม</button>
</div></div>

<div id="app" class="hidden">
  <div class="top"><div class="crest">RC</div><div><h1>รายงานรวม</h1><div class="sub" id="who"></div></div>
    <div class="sp"><button class="t" onclick="location.href='/'">🏠 หน้ารวม</button><button class="t" onclick="location.href='backup.html'">🗄️ สำรองข้อมูล</button><button class="t" onclick="printReport()">🖨️ พิมพ์/PDF</button></div></div>
  <div class="wrap">
    <div class="quick">
      <button class="chip on" id="qToday" onclick="quick('today')">วันนี้</button>
      <button class="chip" id="qYest" onclick="quick('yest')">เมื่อวาน</button>
      <button class="chip" id="qWeek" onclick="quick('week')">7 วันล่าสุด</button>
      <button class="chip" id="qMonth" onclick="quick('month')">เดือนนี้</button>
    </div>
    <div class="g">
      <div><label class="fld">จากวันที่</label><input class="in" id="dFrom" type="date" onchange="clearQuick();load()"></div>
      <div><label class="fld">ถึงวันที่</label><input class="in" id="dTo" type="date" onchange="clearQuick();load()"></div>
    </div>
    <div id="body"><div class="empty">กำลังโหลด…</div></div>
  </div>
</div>
<div id="printArea"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG={SUPABASE_URL:'https://ewfwvykelkamdfsnprwo.supabase.co',SUPABASE_ANON_KEY:'sb_publishable_aPAwNkCIKRTc9FrTW5jeRA_WfnSQqJk'};
const sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
let me=null,rep=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function baht(n){return '฿'+Number(n||0).toLocaleString('th-TH');}
function iso(d){return d.toISOString().slice(0,10);}

async function boot(){
  let emp=null;
  const {data}=await sb.auth.getSession();
  if(data&&data.session){
    const {data:e}=await sb.from('core_employees').select('id,full_name_th,nickname').eq('auth_user_id',data.session.user.id).maybeSingle();
    if(e)emp={id:e.id,name:e.nickname||e.full_name_th};
  }
  if(!emp){try{const st=JSON.parse(sessionStorage.getItem('ryc_staff')||'null');if(st&&st.id)emp={id:st.id,name:st.name};}catch(e){}}
  if(!emp){$('gmsg').textContent='';$('gerr').textContent='ยังไม่ได้ล็อกอิน — กลับไปล็อกอินที่หน้ารวมก่อน';return;}
  const {data:own}=await sb.rpc('core_is_owner_emp',{p_emp:emp.id});
  if(!own){$('gmsg').textContent='';$('gerr').textContent='หน้านี้เปิดให้เฉพาะเจ้าของกิจการ';return;}
  me=emp;
  $('gate').classList.add('hidden');$('app').classList.remove('hidden');
  $('who').textContent=me.name;
  quick('today');
}
function clearQuick(){['qToday','qYest','qWeek','qMonth'].forEach(i=>$(i).classList.remove('on'));}
function quick(k){
  clearQuick();
  const t=new Date();let f=new Date(),to=new Date();
  if(k==='today'){$('qToday').classList.add('on');}
  if(k==='yest'){f.setDate(t.getDate()-1);to.setDate(t.getDate()-1);$('qYest').classList.add('on');}
  if(k==='week'){f.setDate(t.getDate()-6);$('qWeek').classList.add('on');}
  if(k==='month'){f=new Date(t.getFullYear(),t.getMonth(),1);$('qMonth').classList.add('on');}
  $('dFrom').value=iso(f);$('dTo').value=iso(to);load();
}
let profit=null,ext=[],pay=null;
async function load(){
  $('body').innerHTML='<div class="empty">กำลังโหลด…</div>';
  const [r1,r2,r3,r4]=await Promise.all([
    sb.rpc('core_owner_report',{p_emp:me.id,p_from:$('dFrom').value,p_to:$('dTo').value}),
    sb.rpc('core_owner_profit',{p_emp:me.id,p_from:$('dFrom').value,p_to:$('dTo').value}),
    sb.rpc('core_owner_ext',{p_emp:me.id,p_from:$('dFrom').value,p_to:$('dTo').value}),
    sb.rpc('core_owner_pay_split',{p_emp:me.id,p_from:$('dFrom').value,p_to:$('dTo').value})
  ]);
  if(r1.error||!r1.data){$('body').innerHTML='<div class="empty">'+esc(r1.error?r1.error.message:'โหลดไม่สำเร็จ')+'</div>';return;}
  rep=r1.data;profit=r2.data||null;ext=r3.data||[];pay=(r4&&r4.data)||null;render();
}
function thDate(v){const[y,m,d]=v.split('-');return new Date(y,m-1,d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});}
function num(n){return Number(n||0).toLocaleString('th-TH');}
function lineMsg(){
  if(!pay)return '';
  const f=$('dFrom').value,t=$('dTo').value;
  const period=f===t?`📅 ${thDate(f)}`:`📅 ${thDate(f)} – ${thDate(t)}`;
  const rows=(pay.places||[]).map(p=>`🏪 ${p.name} · ฿${num(p.total)} (${p.bills} บิล)\n　💵 สด ${num(p.cash)} · 📲 โอน ${num(p.transfer)}`).join('\n');
  const sm=pay.sum||{};
  return `📊 สรุปยอดขาย Royal Creek\n${period}\n\n${rows||'— ไม่มียอดขายในช่วงนี้ —'}\n━━━━━━━━━━━━\n💰 รวมทั้งหมด ฿${num(sm.total)} (${sm.bills||0} บิล)\n💵 เงินสดรวม ฿${num(sm.cash)}\n📲 เงินโอนรวม ฿${num(sm.transfer)}`;
}
async function copyMsg(){
  const m=lineMsg();if(!m)return;
  try{await navigator.clipboard.writeText(m);}catch(e){
    const ta=document.createElement('textarea');ta.value=m;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
  const b=$('btnCopy');if(b){b.textContent='✓ คัดลอกแล้ว';setTimeout(()=>b.textContent='📋 คัดลอกข้อความ',1600);}
}
async function shareMsg(){
  const m=lineMsg();if(!m)return;
  if(navigator.share){try{await navigator.share({text:m});}catch(e){}}
  else copyMsg();
}
function lineCardHtml(){
  if(!pay)return '';
  return `<div class="lineCard">
    <div class="hd">💬 สรุปส่งเข้าไลน์</div>
    <div class="lineBubble">${esc(lineMsg())}</div>
    <div class="lineBtns">
      <button class="share" onclick="shareMsg()">📤 แชร์เข้า LINE</button>
      <button class="copy" id="btnCopy" onclick="copyMsg()">📋 คัดลอกข้อความ</button>
    </div></div>`;
}
function paySmall(name){
  if(!pay)return '';
  const p=(pay.places||[]).find(x=>x.name===name);
  if(!p)return '';
  return ` · 💵 ${num(p.cash)} · 📲 ${num(p.transfer)}`;
}
function render(){
  const pos=rep.pos_sales||[];
  const rest=rep.rest_sales||{bills:0,total:0};
  const pur=rep.purchases||{count:0,total:0,list:[]};
  const dmg=rep.damages||{count:0,value:0};
  const extTotal=ext.reduce((s,x)=>s+Number(x.total||0),0);
  const extBills=ext.reduce((s,x)=>s+Number(x.bills||0),0);
  const salesTotal=pos.reduce((s,x)=>s+Number(x.total||0),0)+Number(rest.total||0)+extTotal;
  const billsTotal=pos.reduce((s,x)=>s+Number(x.bills||0),0)+Number(rest.bills||0)+extBills;
  const net=salesTotal-Number(pur.total||0);

  const venueRows=pos.map(v=>`<div class="row"><div class="nm"><b>${esc(v.venue)}</b><small>${v.bills} บิล${paySmall(v.venue)}</small></div><b style="color:var(--green-2)">${baht(v.total)}</b></div>`).join('');
  const restRow=`<div class="row"><div class="nm"><b>ห้องอาหาร</b><small>${rest.bills} บิล${paySmall('ห้องอาหาร')}</small></div><b style="color:var(--green-2)">${baht(rest.total)}</b></div>`
    +ext.map(x=>`<div class="row"><div class="nm"><b>${esc(x.channel)}</b><small>${x.bills} บิล · คีย์ยอดปิดวัน${paySmall(x.channel)}</small></div><b style="color:var(--green-2)">${baht(x.total)}</b></div>`).join('');
  const purRows=(pur.list||[]).map(p=>{const dt=new Date(p.at);
    return `<div class="row"><div class="nm"><b>${p.po?esc(p.po)+' · ':''}${esc(p.supplier||'ไม่ระบุซัพ')}</b><small>${dt.toLocaleDateString('th-TH')} · ${esc(p.by||'')}</small></div><b style="color:var(--danger)">−${baht(p.total)}</b></div>`;}).join('')||'<div class="empty">ไม่มีการซื้อเข้าในช่วงนี้</div>';

  $('body').innerHTML=`
    <div class="stat">
      <div class="up"><b>${baht(salesTotal)}</b><span>ยอดขายรวม (${billsTotal} บิล)</span></div>
      <div class="dn"><b>−${baht(pur.total)}</b><span>ยอดซื้อเข้า (${pur.count} ใบ)</span></div>
      <div class="${net>=0?'up':'dn'}"><b>${baht(net)}</b><span>ส่วนต่าง (ขาย − ซื้อ)</span></div>
      <div class="dn"><b>−${baht(dmg.value)}</b><span>ของเสียอนุมัติ (${dmg.count} รายการ)</span></div>
    </div>
    ${lineCardHtml()}
    <div class="sec-h">ยอดขายแยกต่อร้าน</div>
    ${venueRows}${restRow}
    ${profitHtml()}
    <div class="sec-h">รายการซื้อเข้า (ค่าใช้จ่าย)</div>
    ${purRows}`;
}
function profitHtml(){
  if(!profit)return '';
  const sm=profit.summary||{};
  const bv=profit.by_venue||[];const tp=profit.top_products||[];const up=profit.unknown_products||[];
  const vRows=bv.map(v=>`<div class="row"><div class="nm"><b>${esc(v.venue)}</b><small>ขาย ${baht(v.revenue)} · ทุน ${baht(v.cogs)}${v.unknown?` · ไม่ทราบทุน ${v.unknown} รายการ`:''}</small></div><b style="color:${v.profit>=0?'var(--ok)':'var(--danger)'}">${baht(v.profit)}</b></div>`).join('');
  const tRows=tp.map((t,i)=>`<div class="row"><div class="nm"><b>${i+1}. ${esc(t.name)}</b><small>ขาย ${t.qty} ชิ้น · ${baht(t.revenue)}</small></div><b style="color:${t.profit>=0?'var(--ok)':'var(--danger)'}">${baht(t.profit)}</b></div>`).join('');
  const uRows=up.length?`<div style="font-size:12px;color:var(--muted);margin:8px 2px">ยังไม่ทราบทุน (ไม่รวมในกำไร): ${up.map(u=>esc(u.name)+' ×'+u.qty).join(' · ')}</div>`:'';
  return `<div class="sec-h">💰 กำไรขั้นต้นจริง (ราคาขาย − ทุนจริงต่อชิ้น)</div>
    <div class="stat">
      <div><b>${baht(sm.revenue_known)}</b><span>ยอดขายที่ทราบทุน</span></div>
      <div class="dn"><b>−${baht(sm.cogs)}</b><span>ทุนของที่ขายไป</span></div>
      <div class="${(sm.profit||0)>=0?'up':'dn'}"><b>${baht(sm.profit)}</b><span>กำไรขั้นต้น</span></div>
      ${sm.unknown_count?`<div><b>${sm.unknown_count}</b><span>รายการไม่ทราบทุน (${baht(sm.unknown_revenue)})</span></div>`:''}
    </div>
    <div class="sec-h" style="font-size:14px">กำไรต่อร้าน</div>${vRows||'<div class="empty">ไม่มีข้อมูล</div>'}
    <div class="sec-h" style="font-size:14px">สินค้าทำกำไรสูงสุด</div>${tRows||'<div class="empty">ไม่มีข้อมูล</div>'}
    ${uRows}`;
}
function printReport(){
  if(!rep)return;
  const pos=rep.pos_sales||[];const rest=rep.rest_sales||{};const pur=rep.purchases||{list:[]};
  const salesTotal=pos.reduce((s,x)=>s+Number(x.total||0),0)+Number(rest.total||0);
  const net=salesTotal-Number(pur.total||0);
  const vrows=pos.map(v=>`<tr><td>${esc(v.venue)}</td><td class="r">${v.bills}</td><td class="r">${baht(v.total)}</td></tr>`).join('')
    +`<tr><td>ห้องอาหาร</td><td class="r">${rest.bills||0}</td><td class="r">${baht(rest.total)}</td></tr>`;
  const prows=(pur.list||[]).map(p=>{const dt=new Date(p.at);return `<tr><td>${p.po?esc(p.po):'—'}</td><td>${esc(p.supplier||'-')}</td><td>${dt.toLocaleDateString('th-TH')}</td><td class="r">${baht(p.total)}</td></tr>`;}).join('')||'<tr><td colspan="4" style="text-align:center">ไม่มี</td></tr>';
  $('printArea').innerHTML=`<h2>Royal Creek — รายงานรวม</h2>
    <div class="sub">ช่วง ${$('dFrom').value} ถึง ${$('dTo').value} · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <div class="cards"><div><b>${baht(salesTotal)}</b>ยอดขายรวม</div><div><b>${baht(pur.total)}</b>ยอดซื้อเข้า</div><div><b>${baht(net)}</b>ส่วนต่าง</div></div>
    ${pay?`<div style="border:2px solid #333;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px"><b>💰 แยกวิธีชำระ (ทุกจุดขาย):</b> เงินสด ${baht(pay.sum.cash)} · เงินโอน ${baht(pay.sum.transfer)} · รวม ${baht(pay.sum.total)} (${pay.sum.bills} บิล)</div>`:''}
    <table><thead><tr><th>ร้าน</th><th class="r">บิล</th><th class="r">ยอดขาย</th></tr></thead><tbody>${vrows}</tbody></table>
    <table><thead><tr><th>PO</th><th>ซัพพลายเออร์</th><th>วันที่</th><th class="r">ยอดซื้อ</th></tr></thead><tbody>${prows}</tbody></table>`;
  const win=window.open('','_blank');
  if(!win){alert('เบราว์เซอร์บล็อกหน้าต่างพิมพ์ — อนุญาต popup ให้เว็บนี้');return;}
  win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>รายงานรวม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Sarabun',sans-serif;color:#000;margin:16px}
  h2{text-align:center;margin:0 0 2px}.sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  th{background:#f0efe8}.r{text-align:right}
  .cards{display:flex;gap:10px;margin-bottom:12px}.cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}.cards b{display:block;font-size:18px}
  </style></head><body>${$('printArea').innerHTML}`+'<scr'+'ipt>'+`window.onload=function(){setTimeout(function(){window.print();},250);}`+'</scr'+'ipt>'+`</body></html>`);
