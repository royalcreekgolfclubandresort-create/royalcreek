<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ห้องอาหาร · Royal Creek</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#123a2a;--green-2:#1b5e3f;--gold:#c9a24b;--gold-soft:#e6d29a;--cream:#f6f4ee;--card:#fff;--ink:#20261f;--muted:#6b7268;--line:#e2ddcf;--danger:#a3352d;--ok:#1b7a4a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%}
  body{font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--cream);font-size:15px;line-height:1.4}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select{font-family:inherit;font-size:inherit}
  .hidden{display:none!important}
  .crest{width:38px;height:38px;border-radius:11px;background:#0d2b1f;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--gold);color:var(--gold);font-weight:700;font-size:13px;flex:none}
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(120% 90% at 50% -10%,#16482f,var(--green) 55%,#0d2b1f)}
  .lcard{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:26px 22px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .fld{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  .staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .sbtn{padding:14px 12px;border:1.5px solid var(--line);border-radius:13px;background:#fbfaf5;text-align:left}.sbtn .nm{font-weight:600}.sbtn .nk{font-size:13px;color:var(--muted)}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0 18px}.pd{width:15px;height:15px;border-radius:50%;border:2px solid var(--line)}.pd.f{background:var(--green-2);border-color:var(--green-2)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pad button{height:56px;border-radius:13px;background:#fbfaf5;border:1.5px solid var(--line);font-size:22px;font-weight:600}
  .link{display:block;text-align:center;margin-top:14px;color:var(--green-2);font-weight:600;font-size:14px}
  .msg{margin-top:12px;text-align:center;font-size:14px;min-height:20px;color:var(--danger)}

  #app{display:flex;min-height:100vh}
  .side{width:200px;background:var(--green);color:#fff;display:flex;flex-direction:column;flex:none;position:sticky;top:0;height:100vh}
  .side .logo{display:flex;align-items:center;gap:10px;padding:16px 16px 14px}
  .side .logo b{font-size:15px}.side .logo small{display:block;font-size:11px;color:var(--gold-soft)}
  .nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:11px;padding:12px 12px;border-radius:10px;color:#dfe9e2;font-weight:600;font-size:14px;text-align:left;width:100%}
  .nav button .ic{font-size:17px}.nav button.on{background:rgba(255,255,255,.14);color:#fff}
  .side .u{padding:12px 14px;border-top:1px solid rgba(255,255,255,.12);font-size:13px;color:var(--gold-soft)}
  .side .u b{display:block;color:#fff}
  .side .u button{margin-top:8px;border:1px solid rgba(255,255,255,.3);border-radius:9px;padding:6px 10px;color:#fff;font-size:12px;font-weight:600;margin-right:6px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .hbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:6}
  .hbar h2{margin:0;font-size:17px}.hbar .vn{margin-left:auto;font-size:13px;color:var(--muted)}
  .mini{border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;color:var(--green-2)}
  .content{flex:1;min-height:0}
  @media(max-width:820px){
    #app{flex-direction:column}
    .side{width:auto;height:auto;flex-direction:row;align-items:center;position:sticky;top:0;z-index:9;overflow-x:auto}
    .side .logo{padding:10px 12px}.side .logo small{display:none}
    .nav{flex-direction:row;padding:6px;gap:4px;flex:1}
    .nav button{padding:9px 11px;white-space:nowrap;font-size:13px}.nav button .lbl{display:none}.nav button .ic{font-size:19px}
    .side .u{display:none}
  }
  .pad2{padding:14px 16px 100px;max-width:900px;margin:0 auto;width:100%}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .tbl{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:18px 14px;text-align:center;min-height:110px;display:flex;flex-direction:column;justify-content:center;gap:5px}
  .tbl:active{transform:scale(.98)}.tbl .tn{font-size:17px;font-weight:700}
  .tbl.busy{background:#eef5f0;border-color:var(--green-2)}.tbl .free{color:var(--muted);font-size:13px}
  .tbl .amt{color:var(--green-2);font-weight:700;font-size:16px}.tbl .cnt{font-size:12px;color:var(--muted)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px}
  .chip{padding:7px 13px;border:1.5px solid var(--line);border-radius:20px;background:var(--card);font-size:13px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%}.chip.on{border-color:var(--green-2);background:#eef5f0;color:var(--green-2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:9px;margin-top:6px}
  .mi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;min-height:92px;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .mi:active{background:#fbfaf5;transform:scale(.98)}.mi .em{font-size:24px}.mi .mn{font-size:12px;font-weight:600;line-height:1.15}.mi .mp{font-size:13px;font-weight:700;color:var(--green-2)}
  .catsec-h{grid-column:1/-1;font-weight:700;font-size:13px;margin:10px 2px 0;display:flex;align-items:center;gap:6px}
  .catsec-h .dot{width:9px;height:9px;border-radius:50%}
  .barb{position:fixed;left:0;right:0;bottom:0;background:var(--green);color:#fff;padding:11px 14px;display:flex;align-items:center;gap:10px;z-index:15}
  .barb .n{background:var(--gold);color:#3a2e0a;font-weight:700;border-radius:20px;padding:2px 10px}
  .barb .go{margin-left:auto;background:#fff;color:var(--green);border-radius:10px;padding:10px 15px;font-weight:700}
  .barb .bill{border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:10px 13px;font-weight:700}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .row .em{font-size:22px}.row .nm{flex:1;min-width:0}.row .nm b{font-weight:600}.row .nm small{color:var(--muted);display:block;font-size:12px}
  .qbadge{min-width:42px;text-align:center;font-weight:700;padding:4px 8px;border-radius:9px;background:#eef5f0;color:var(--green-2)}.qbadge.low{background:#faece9;color:var(--danger)}
  .addbtn{width:100%;height:46px;border-radius:12px;border:1.5px dashed var(--gold);color:#8a6d1f;font-weight:700;margin-bottom:12px}
  .sec-h{font-weight:700;font-size:14px;margin:18px 2px 10px}
  .pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
  .pill.pending{background:#f6efd9;color:#8a6d1f}.pill.approved{background:#e4f0e9;color:var(--ok)}.pill.rejected{background:#faece9;color:var(--danger)}
  .stat{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}.stat div{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}
  .mv{display:flex;gap:10px;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line)}.mv .k{font-weight:600;min-width:48px}.mv .d{margin-left:auto;font-weight:600}.mv .d.pos{color:var(--ok)}.mv .d.neg{color:var(--danger)}
  .empty{text-align:center;color:var(--muted);padding:34px}
  .ov{position:fixed;inset:0;background:rgba(20,25,20,.55);display:flex;align-items:flex-end;justify-content:center;z-index:30}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px;max-height:88vh;overflow:auto}
  .sheet h3{margin:0 0 12px}.ci{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}.ci .cn{flex:1}
  .del{color:var(--danger);font-weight:700;font-size:18px;padding:0 6px}
  .pay{display:flex;gap:10px;margin:10px 0}.pay button{flex:1;height:46px;border-radius:10px;border:1.5px solid var(--line);background:#fbfaf5;font-weight:600}.pay button.on{border-color:var(--green-2);background:#eef5f0;color:var(--green-2)}
  .totrow{display:flex;justify-content:space-between;font-size:19px;font-weight:700;margin:8px 0}
  .btn{width:100%;height:50px;border-radius:12px;background:var(--green-2);color:#fff;font-weight:700}
  .ghost{width:100%;height:44px;border-radius:12px;color:var(--muted);font-weight:600;margin-top:8px}
  .in{width:100%;height:46px;border:1.5px solid var(--line);border-radius:10px;padding:0 12px;background:#fbfaf5;margin-bottom:10px}
  .g2{display:flex;gap:10px}.g2>*{flex:1}
  .togg{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fbfaf5;margin-bottom:12px}.togg input{width:20px;height:20px}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;transition:.25s;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #rcpt .rc{font-family:'Sarabun',monospace;padding:4px}.rc .ch2{text-align:center;font-weight:700;font-size:16px}.rc .cc{text-align:center;font-size:12px;color:var(--muted);margin-bottom:6px}
  .rc .dash{border-top:1px dashed #999;margin:7px 0}.rc .rr{display:flex;justify-content:space-between;font-size:13px;margin:2px 0}.rc .tt{display:flex;justify-content:space-between;font-weight:700;font-size:15px}
  #printArea{position:absolute;left:-9999px;top:0;background:#fff;color:#000;width:800px;padding:16px;font-size:13px}
  #printArea h2{text-align:center;margin:0 0 2px}#printArea .sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  #printArea table{width:100%;border-collapse:collapse}#printArea th,#printArea td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  #printArea th{background:#f0efe8}#printArea .r{text-align:right}#printArea .c{text-align:center}
  #printArea .cards{display:flex;gap:10px;margin-bottom:12px}#printArea .cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}#printArea .cards b{display:block;font-size:18px}
  #printArea .billhd{background:#f6f4ee;font-weight:700}
  @media print{body *{visibility:hidden}.printable,.printable *{visibility:visible}.printable{position:absolute;left:0;top:0;width:100%}.printable.rcptw{width:80mm;max-width:80mm}button{display:none!important}}
.osplit{display:flex;gap:14px;align-items:flex-start}
.bside{display:none}
@media(min-width:900px){.bside{display:block;width:335px;flex:none;position:sticky;top:66px}}
.bellw{position:relative;display:inline-flex;margin-left:8px}.bellb{background:none;border:none;font-size:22px;cursor:pointer;position:relative;padding:4px}.bellbadge{position:absolute;top:-2px;right:-4px;background:#e23b3b;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 4px}.bellbadge.on{display:flex}</style></head><body>

<div id="login" class="center"><div class="lcard">
  <div class="brand"><div class="crest">RC</div><div><h1>ห้องอาหาร</h1><p>เลือกชื่อแล้วใส่ PIN</p></div></div>
  <div id="pick"><div class="staff-grid" id="grid"></div></div>
  <div id="pinBox" class="hidden"><label class="fld" id="pinName"></label><div class="pin-dots" id="dots"></div><div class="pad" id="padEl"></div><a class="link" onclick="backPick()">← เลือกคนอื่น</a></div>
  <div id="lmsg" class="msg"></div>
</div></div>

<div id="app" class="hidden">
  <aside class="side">
    <div class="logo"><div class="crest">RC</div><div><b>ห้องอาหาร</b><small>REST</small></div></div>
    <nav class="nav">
      <button id="nTables" class="on" onclick="go('tables')"><span class="ic">🍽</span><span class="lbl">โต๊ะ</span></button>
      <button id="nStock" onclick="go('stock')"><span class="ic">📦</span><span class="lbl">สต็อก</span></button>
      <button id="nReq" onclick="go('req')"><span class="ic">📥</span><span class="lbl">เบิกของ</span></button>
      <button id="nDamage" onclick="go('damage')"><span class="ic">⚠️</span><span class="lbl">ตัดชำรุด</span></button>
      <button id="nReport" onclick="go('report')"><span class="ic">📊</span><span class="lbl">ยอดขาย</span></button>
    </nav>
    <div class="u"><span>พนักงาน</span><b id="uName">—</b>
      <div class="bellw"><button class="bellb" onclick="goNotify()">🔔<span class="bellbadge" id="bellBadge">0</span></button></div><button onclick="location.href='/'">🏠 หน้ารวม</button><button onclick="logout()">ออก</button></div>
  </aside>
  <div class="main">
    <div class="hbar"><h2 id="pageTitle">โต๊ะ</h2>
      <button class="mini" id="manageBtn" onclick="openManage()">จัดการเมนู</button>
      <button class="mini" onclick="printPage()">🖨️ พิมพ์/PDF</button>
      <span class="vn" id="hWho"></span></div>
    <div class="content">
      <div id="pgTables" class="pad2"></div>
      <div id="pgOrder" class="pad2 hidden"></div>
      <div id="pgStock" class="pad2 hidden"></div>
      <div id="pgReq" class="pad2 hidden"></div>
      <div id="pgDamage" class="pad2 hidden"></div>
      <div id="pgReport" class="pad2 hidden"></div>
    </div>
  </div>
</div>
<div id="barb" class="hidden"></div>
<div id="modal"></div><div id="printArea"></div><div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG={SUPABASE_URL:'https://ewfwvykelkamdfsnprwo.supabase.co',SUPABASE_ANON_KEY:'sb_publishable_aPAwNkCIKRTc9FrTW5jeRA_WfnSQqJk'};
const sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const VENUE='REST';
let sel=null,pin='',me=null,menu=[],cats=[],drinks=[],posCats=[],curTable=null,round=[],order={items:[],total:0},catFilter=null,payMethod='cash',reqCart=[],reqCatalog=[],page='tables';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function baht(n){return '฿'+Number(n||0).toLocaleString('th-TH');}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800);}

/* ===== LOGIN ===== */
async function loadStaff(){const {data}=await sb.from('core_staff_directory').select('*').order('full_name_th');
  if(!data||!data.length){$('grid').innerHTML='<div style="color:var(--muted);font-size:14px">ยังไม่มีพนักงานที่ตั้ง PIN</div>';return;}
  $('grid').innerHTML=data.map(s=>`<button class="sbtn" onclick='pick(${JSON.stringify(s)})'><div class="nm">${esc(s.nickname||s.full_name_th)}</div><div class="nk">${esc(s.full_name_th)}</div></button>`).join('');}
function pick(s){sel=s;pin='';$('pick').classList.add('hidden');$('pinBox').classList.remove('hidden');$('pinName').textContent='PIN ของ '+(s.nickname||s.full_name_th);pad();dots();$('lmsg').textContent='';}
function backPick(){sel=null;pin='';$('pinBox').classList.add('hidden');$('pick').classList.remove('hidden');$('lmsg').textContent='';}
function pad(){$('padEl').innerHTML=['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>k===''?'<span></span>':k==='⌫'?`<button onclick="pinDel()">⌫</button>`:`<button onclick="pinPush('${k}')">${k}</button>`).join('');}
function dots(){$('dots').innerHTML=[0,1,2,3].map(i=>`<div class="pd ${i<pin.length?'f':''}"></div>`).join('');}
function pinPush(d){if(pin.length>=4)return;pin+=d;dots();if(pin.length===4)verify();}
function pinDel(){pin=pin.slice(0,-1);dots();}
async function verify(){
  const {data,error}=await sb.rpc('core_verify_staff_pin',{emp_id:sel.id,pin});
  if(error||!data){$('lmsg').textContent='PIN ไม่ถูกต้อง';pin='';dots();return;}
  if(!await enterEmp(data.employee.id,data.employee.nickname||data.employee.name)){$('lmsg').textContent='บัญชีนี้ไม่มีสิทธิ์ห้องอาหาร';pin='';dots();}
}
async function enterEmp(id,name){
  const {data:lvl}=await sb.rpc('core_rest_lvl',{p_emp:id});
  if(!lvl||lvl<20)return false;
  me={id,name,lvl,isManager:lvl>=80,isOwner:lvl>=100};
  try{sessionStorage.setItem('ryc_staff',JSON.stringify({id,name}));}catch(e){}
  start();return true;
}
async function enterAsStaff(id){const {data}=await sb.rpc('core_staff_context',{p_emp:id});if(!data||!data.employee)return false;return await enterEmp(data.employee.id,data.employee.nickname||data.employee.name);}
async function enterAsAuth(user){
  const {data:emp}=await sb.from('core_employees').select('id,full_name_th,nickname').eq('auth_user_id',user.id).maybeSingle();
  if(!emp)return false;return await enterEmp(emp.id,emp.nickname||emp.full_name_th);
}
async function pollNotify(){try{const {data}=await sb.rpc('core_notify_venue',{p_emp:me.id,p_venue:'REST'});const b=$('bellBadge');if(b){b.textContent=data||0;b.classList.toggle('on',(data||0)>0);}}catch(e){}}
function goNotify(){go('req');}
setInterval(()=>{if(me)pollNotify();},30000);
async function logout(){await sb.auth.signOut();try{sessionStorage.removeItem('ryc_staff');}catch(e){}location.reload();}

/* ===== START / NAV ===== */
async function start(){
  $('login').classList.add('hidden');$('app').classList.remove('hidden');pollNotify();
  $('uName').textContent=me.name;$('hWho').textContent=me.name;
  $('manageBtn').classList.toggle('hidden',me.lvl<50);
  await loadData();go('tables');
}
async function loadData(){
  const [m,c,d,pc]=await Promise.all([
    sb.from('core_rest_menu').select('*').eq('active',true).order('name_th'),
    sb.from('core_rest_categories').select('*').order('sort_order'),
    sb.rpc('core_pos_products_for_venue',{p_venue:VENUE}),
    sb.from('core_pos_categories').select('*').order('sort_order')]);
  menu=m.data||[];cats=c.data||[];drinks=d.data||[];posCats=pc.data||[];
}
const TITLES={tables:'โต๊ะ',order:'สั่งอาหาร',stock:'สต็อก',req:'เบิกของจากคลัง',damage:'ตัดชำรุด',report:'ยอดขาย'};
function go(p){
  page=p;
  ['Tables','Stock','Req','Damage','Report'].forEach(n=>{const b=$('n'+n);if(b)b.classList.toggle('on',n.toLowerCase()===(p==='order'?'tables':p));});
  $('pageTitle').textContent=TITLES[p]||p;
  ['Tables','Order','Stock','Req','Damage','Report'].forEach(n=>$('pg'+n).classList.toggle('hidden',n.toLowerCase()!==p));
  $('barb').classList.toggle('hidden',p!=='order');
  $('manageBtn').classList.toggle('hidden',me.lvl<50||p!=='tables'&&p!=='order');
  if(p==='tables')renderTables();
  if(p==='stock')renderStock();
  if(p==='req')renderReqPage();
  if(p==='damage')renderDamage();
  if(p==='report')renderReport();
}

/* ===== โต๊ะ ===== */
async function renderTables(){
  curTable=null;round=[];
  $('pgTables').innerHTML='<div class="empty">กำลังโหลด…</div>';
  const {data}=await sb.rpc('core_rest_tables_status');
  $('pgTables').innerHTML=`<div class="tgrid">`+(data||[]).map(t=>{const busy=!!t.order_id;
    return `<button class="tbl ${busy?'busy':''}" onclick='tapTable(${t.table_id},"${esc(t.name)}")'>
      <div class="tn">${esc(t.name)}</div>${busy?`<div class="amt">${baht(t.total)}</div><div class="cnt">${t.items} รายการ</div>`:'<div class="free">ว่าง</div>'}</button>`;}).join('')+`</div>`;
}
let menuQ='',disc=0;
async function tapTable(id,name){menuQ='';disc=0;
  const {data:oid,error}=await sb.rpc('core_rest_open',{p_emp:me.id,p_table:id});
  if(error){toast(error.message||'เปิดโต๊ะไม่ได้');return;}
  curTable={id,name,order_id:oid};round=[];await loadOrder();await refreshDrinks();
  go('order');renderOrder();
}
async function loadOrder(){const {data}=await sb.rpc('core_rest_order',{p_order:curTable.order_id});order=data||{items:[],total:0};}
async function refreshDrinks(){const {data}=await sb.rpc('core_pos_products_for_venue',{p_venue:VENUE});drinks=data||[];}

/* ===== สั่งอาหาร ===== */
function renderOrder(){
  $('pageTitle').textContent=curTable.name;
  const used=[...new Set(menu.map(m=>m.category_id))];
  const chips=`<button class="chip ${catFilter===null?'on':''}" onclick="setCat(null)">อาหารทั้งหมด</button>`+
    cats.filter(c=>used.includes(c.id)).map(c=>`<button class="chip ${catFilter===c.id?'on':''}" onclick="setCat(${c.id})"><span class="dot" style="background:${c.color||'#9AA0A6'}"></span>${esc(c.name_th)}</button>`).join('')+
    `<button class="chip ${catFilter==='drink'?'on':''}" onclick="setCat('drink')">🥤 เครื่องดื่ม</button>`;
  $('pgOrder').innerHTML=`<div class="osplit"><div style="flex:1;min-width:0">
      <button class="mini" onclick="go('tables')">← โต๊ะทั้งหมด</button>
      <input class="in" id="menuSearch" placeholder="🔍 ค้นหาเมนู / เครื่องดื่ม" value="${esc(menuQ)}" oninput="menuQ=this.value;paintOrderGrid()" autocomplete="off" style="margin:10px 0 0">
      <div class="chips" style="margin-top:10px">${chips}</div><div class="grid" id="ordGrid"></div>
    </div><div class="bside" id="bside"></div></div>`;
  paintOrderGrid();renderBar();
}
function paintOrderGrid(){
  const q=(menuQ||'').trim().toLowerCase();
  let grid;
  if(catFilter==='drink'||(q&&catFilter==='drink')){
    const dcard=d=>{const out=d.qty<=0;return `<button class="mi" ${out?'disabled style=opacity:.4':''} onclick="addRoundDrink(${d.product_id})"><span class="em">${esc(d.emoji||'🥤')}</span><span class="mn">${esc(d.name_th)}</span><span class="mp">${baht(d.price)}</span><span style="font-size:11px;color:var(--muted)">เหลือ ${d.qty}</span></button>`;};
    const hdr=(n,c)=>`<div class="catsec-h"><span class="dot" style="background:${c||'#9AA0A6'}"></span>${esc(n)}</div>`;
    const src=drinks.filter(d=>!q||(d.name_th||'').toLowerCase().includes(q));
    let html='';
    posCats.forEach(c=>{const g=src.filter(d=>d.category_id===c.id);if(g.length)html+=hdr(c.name_th,c.color)+g.map(dcard).join('');});
    const none=src.filter(d=>!d.category_id||!posCats.find(c=>c.id===d.category_id));
    if(none.length)html+=hdr('อื่นๆ','#9AA0A6')+none.map(dcard).join('');
    grid=html||'<div class="empty" style="grid-column:1/-1">'+(q?'ไม่พบ':'ยังไม่มีเครื่องดื่ม — ไปหน้า “เบิกของ”')+'</div>';
  }else{
    let list=menu; if(catFilter!==null)list=list.filter(m=>m.category_id===catFilter);
    if(q)list=list.filter(m=>(m.name_th||'').toLowerCase().includes(q));
    let dHtml='';
    if(q){const dm=drinks.filter(d=>(d.name_th||'').toLowerCase().includes(q));
      dHtml=dm.map(d=>{const out=d.qty<=0;return `<button class="mi" ${out?'disabled style=opacity:.4':''} onclick="addRoundDrink(${d.product_id})"><span class="em">${esc(d.emoji||'🥤')}</span><span class="mn">${esc(d.name_th)}</span><span class="mp">${baht(d.price)}</span><span style="font-size:11px;color:var(--muted)">เหลือ ${d.qty}</span></button>`;}).join('');}
    grid=(list.map(m=>`<button class="mi" onclick="addRoundMenu(${m.id})"><span class="em">${esc(m.emoji||'🍽')}</span><span class="mn">${esc(m.name_th)}</span><span class="mp">${baht(m.price)}</span></button>`).join('')+dHtml)||'<div class="empty" style="grid-column:1/-1">'+(q?'ไม่พบ':'ยังไม่มีเมนู — กด “จัดการเมนู”')+'</div>';
  }
  $('ordGrid').innerHTML=grid;
}
function setCat(id){catFilter=id;renderOrder();}
function billItemsHtml(){
  return order.items.map(it=>`<div class="ci"><div class="cn">${it.billed?'🔒 ':''}${esc(it.name)} × ${it.qty}<br><small style="color:var(--muted)">${baht(it.price)}</small></div><b>${baht(it.total)}</b>${(me.isManager||!it.billed)?`<button class="del" onclick="delItem('${it.id}')">×</button>`:''}</div>`).join('')||'<div class="empty">ยังไม่มีรายการ</div>';
}
function discHtml(){
  const amt=Math.round(order.total*(Number(disc)||0))/100;
  return `<div style="display:flex;gap:8px;align-items:center;margin:8px 0"><span style="font-size:13px;color:var(--muted);flex:none">ส่วนลด %</span>
    <input class="in" type="number" inputmode="decimal" value="${disc||''}" placeholder="0" style="margin:0;height:40px;max-width:90px" onchange="disc=this.value;renderBar();if(document.querySelector('.sheet h3'))openBill()">
    <span style="flex:1;text-align:right;font-size:13px;color:var(--danger)">${amt?('−'+baht(amt)):''}</span></div>`;
}
function netTotal(){return Math.round((order.total-(order.total*(Number(disc)||0)/100))*100)/100;}
async function printOrderSlip(){
  if(!order.items.length){toast('ยังไม่มีรายการ');return;}
  const {error}=await sb.rpc('core_rest_bill_mark',{p_emp:me.id,p_order:curTable.order_id});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  const dt=new Date();
  const rows=order.items.map((it,i)=>`<tr><td style="border-bottom:1px solid #ccc;padding:6px 8px">${i+1}</td><td style="border-bottom:1px solid #ccc;padding:6px 8px;text-align:left">${esc(it.name)}</td><td style="border-bottom:1px solid #ccc;padding:6px 8px;text-align:center">${it.qty}</td><td style="border-bottom:1px solid #ccc;padding:6px 8px;text-align:right">${baht(it.total)}</td></tr>`).join('');
  printDoc('บิลโต๊ะ',`<div style="font-family:'Sarabun',sans-serif">
    <h2 style="margin:0">บิลโต๊ะ · ${esc(curTable.name)} <span style="font-size:13px;color:#888">(ยังไม่ชำระเงิน)</span></h2>
    <div style="color:#555;font-size:13px;margin:2px 0 12px">${dt.toLocaleString('th-TH')} · ${esc(me.name)}</div>
    <table style="border-collapse:collapse;width:100%;font-size:14px"><thead><tr style="background:#eee"><th style="padding:6px 8px">#</th><th style="padding:6px 8px;text-align:left">รายการ</th><th style="padding:6px 8px">จำนวน</th><th style="padding:6px 8px;text-align:right">ราคา</th></tr></thead><tbody>${rows}</tbody></table>
    <div style="text-align:right;font-weight:700;font-size:17px;margin-top:10px">รวม ${baht(order.total)}</div></div>`);
  await loadOrder();renderBar();
  toast('พิมพ์บิลแล้ว — รายการถูกล็อก 🔒');
}
function addRoundMenu(mid){const m=menu.find(x=>x.id===mid);if(!m)return;const r=round.find(x=>x.kind==='menu'&&x.ref===mid);if(r)r.qty++;else round.push({kind:'menu',ref:mid,name:m.name_th,price:m.price,qty:1});renderBar();toast(m.name_th);}
function addRoundDrink(pid){const d=drinks.find(x=>x.product_id===pid);if(!d)return;const already=round.filter(x=>x.kind==='drink'&&x.ref===pid).reduce((s,x)=>s+x.qty,0);if(already+1>d.qty){toast('เครื่องดื่มไม่พอ (เหลือ '+d.qty+')');return;}const r=round.find(x=>x.kind==='drink'&&x.ref===pid);if(r)r.qty++;else round.push({kind:'drink',ref:pid,name:d.name_th,price:d.price,qty:1});renderBar();toast(d.name_th);}
function renderBar(){
  const n=round.reduce((s,x)=>s+x.qty,0), sum=round.reduce((s,x)=>s+x.qty*x.price,0);
  $('barb').innerHTML=`<span class="n">${n}</span><span>รอส่ง ${baht(sum)}</span>
    <button class="bill" onclick="openBill()">🧾 บิล ${baht(order.total)}</button>
    <button class="go" ${n?'':'style=opacity:.5'} onclick="sendRound()">ส่งเข้าโต๊ะ ›</button>`;
  $('barb').style.display=(window.innerWidth>=900)?'none':'';
  renderBillSide(n,sum);
}
function renderBillSide(n,sum){
  const el=$('bside');if(!el)return;
  const pend=round.map((x,i)=>`<div class="ci" style="opacity:.75"><div class="cn">⏳ ${esc(x.name)} × ${x.qty}</div><b>${baht(x.qty*x.price)}</b></div>`).join('');
  el.innerHTML=`<div style="background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px">
    <div style="font-weight:700;margin-bottom:8px">🧾 บิล · ${esc(curTable?curTable.name:'')}</div>
    ${billItemsHtml()}
    ${pend?`<div style="font-size:12px;color:var(--muted);margin:8px 0 4px">รอส่งเข้าโต๊ะ</div>${pend}
      <button class="btn" style="height:44px;margin-top:6px" onclick="sendRound()">ส่งเข้าโต๊ะ (${n})</button>`:''}
    <div style="border-top:1px dashed var(--line);margin-top:10px;padding-top:8px">
    ${discHtml()}
    <div class="totrow" style="margin:4px 0"><span>สุทธิ</span><span>${baht(netTotal())}</span></div>
    <div class="pay" style="margin:8px 0"><button class="${payMethod==='cash'?'on':''}" onclick="setPay2('cash')">เงินสด</button><button class="${payMethod==='transfer'?'on':''}" onclick="setPay2('transfer')">โอน</button></div>
    <button class="ghost" style="border:1px solid var(--line);border-radius:10px;width:100%;height:42px;margin-bottom:8px" onclick="printOrderSlip()">🖨️ พิมพ์บิล (ล็อกรายการ)</button>
    <button class="btn" ${order.items.length?'':'disabled'} onclick="closeBill()">เก็บเงิน ${baht(netTotal())}</button>
    ${me.isManager?`<button class="ghost" style="color:var(--danger);width:100%" onclick="voidTable()">ยกเลิกโต๊ะ</button>`:''}
    </div></div>`;
}
function setPay2(m){payMethod=m;renderBar();}
async function sendRound(){
  if(!round.length){openBill();return;}
  const foods=round.filter(x=>x.kind==='menu').map(r=>({menu_id:r.ref,qty:r.qty,name:r.name}));
  const dks=round.filter(x=>x.kind==='drink').map(r=>({product_id:r.ref,qty:r.qty}));
  try{
    if(foods.length){const {error}=await sb.rpc('core_rest_add',{p_emp:me.id,p_order:curTable.order_id,p_items:foods.map(f=>({menu_id:f.menu_id,qty:f.qty}))});if(error)throw error;}
    if(dks.length){const {error}=await sb.rpc('core_rest_add_drinks',{p_emp:me.id,p_order:curTable.order_id,p_items:dks});if(error)throw error;}
  }catch(e){toast(e.message||'ส่งไม่สำเร็จ');return;}
  if(foods.length)printKitchen(foods);
  round=[];await loadOrder();await refreshDrinks();toast('ส่งเข้าโต๊ะแล้ว');renderOrder();
}
/* ใบครัว — พิมพ์รายการอาหารรอบที่เพิ่งส่ง ให้ครัวทำ (ไม่มีราคา) */
function printKitchen(foods){
  const dt=new Date();
  const rows=foods.map(f=>`<div class="rr" style="font-size:17px;font-weight:700;margin:6px 0"><span>${esc(f.name)}</span><span>× ${f.qty}</span></div>`).join('');
  printDoc('ใบสั่งครัว',`<div class="rc">
    <div class="ch2">🍳 ใบสั่งครัว</div>
    <div class="cc">${esc(curTable.name)} · ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น. · ${esc(me.name)}</div>
    <div class="dash"></div>${rows}<div class="dash"></div>
    <div class="cc">รวม ${foods.reduce((s,x)=>s+x.qty,0)} รายการ</div></div>`,true);
}
function openBill(){
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>บิล · ${esc(curTable.name)}</h3>
    <p style="font-size:12px;color:var(--muted);margin:0 0 10px">🔒 = พิมพ์บิลแล้ว ลบได้เฉพาะผู้จัดการ</p>${billItemsHtml()}
    ${discHtml()}
    <div class="pay"><button class="${payMethod==='cash'?'on':''}" onclick="setPay('cash')">เงินสด</button><button class="${payMethod==='transfer'?'on':''}" onclick="setPay('transfer')">โอน</button></div>
    <div class="totrow"><span>สุทธิ</span><span>${baht(netTotal())}</span></div>
    <button class="ghost" style="border:1px solid var(--line);border-radius:10px;width:100%;height:42px;margin-bottom:8px" onclick="printOrderSlip();closeModal()">🖨️ พิมพ์บิล (ล็อกรายการ)</button>
    <button class="btn" ${order.items.length?'':'disabled'} onclick="closeBill()">เก็บเงิน ${baht(netTotal())}</button>
    ${me.isManager?`<button class="ghost" style="color:var(--danger)" onclick="voidTable()">ยกเลิกโต๊ะ (ไม่เก็บเงิน)</button>`:''}
    <button class="ghost" onclick="closeModal()">ปิด</button></div></div>`;
}
function setPay(m){payMethod=m;openBill();}
async function delItem(id){const {error}=await sb.rpc('core_rest_item_del',{p_emp:me.id,p_item:id});if(error){toast(error.message||'ลบไม่สำเร็จ');return;}await loadOrder();await refreshDrinks();renderBar();if(document.querySelector('.sheet h3'))openBill();toast('ลบแล้ว (คืนสต็อกถ้าเป็นเครื่องดื่ม)');}
async function closeBill(){
  const {data,error}=await sb.rpc('core_rest_close',{p_emp:me.id,p_order:curTable.order_id,p_pay:payMethod,p_discount:Number(disc)||0});
  if(error||!data){toast(error?error.message:'เก็บเงินไม่สำเร็จ');return;}
  showReceipt(data);
}
async function voidTable(){if(!confirm('ยกเลิกโต๊ะนี้? รายการจะถูกล้าง เครื่องดื่มคืนสต็อก'))return;
  const {error}=await sb.rpc('core_rest_void',{p_emp:me.id,p_order:curTable.order_id});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('ยกเลิกโต๊ะแล้ว');go('tables');}
function closeModal(){$('modal').innerHTML='';}
function showReceipt(r){
  const dt=new Date();const items=(r.items||[]).map(it=>`<div class="rr"><span>${esc(it.name)}</span><span>${baht(it.total)}</span></div><div style="font-size:11px;color:#888;margin:-1px 0 3px">${it.qty} × ${baht(it.price)}</div>`).join('');
  $('modal').innerHTML=`<div class="ov"><div class="sheet printable rcptw" id="rcpt"><div class="rc">
    <div class="ch2">Royal Creek · ห้องอาหาร</div><div class="cc">${esc(r.table||'')} · บิล ${esc(r.bill_no)}<br>${dt.toLocaleString('th-TH')}</div><div class="dash"></div>
    ${items}<div class="dash"></div>${r.discount>0?`<div class="rr"><span>รวม</span><span>${baht(r.subtotal)}</span></div><div class="rr"><span>ส่วนลด ${r.discount_pct}%</span><span>−${baht(r.discount)}</span></div>`:''}<div class="tt"><span>รวมทั้งหมด</span><span>${baht(r.total)}</span></div>
    <div class="rr"><span>ชำระ</span><span>${r.pay==='transfer'?'โอน':'เงินสด'}</span></div>
    <div class="cc" style="margin-top:8px">ขอบคุณที่ใช้บริการ 🙏</div></div>
    <div><button class="btn" onclick="printReceipt()">พิมพ์ใบเสร็จ</button><button class="ghost" onclick="closeModal();go('tables')">เสร็จสิ้น</button></div>
  </div></div>`;
}
function printReceipt(){const rc=document.querySelector('#rcpt .rc');if(!rc)return;printDoc('ใบเสร็จ',`<div class="rc">${rc.innerHTML}</div>`,true);}

/* ===== สต็อก (เครื่องดื่ม REST) ===== */
let stkQ='';
function paintStockList(){
  const q=(stkQ||'').trim().toLowerCase();
  const list=drinks.filter(s=>!q||(s.name_th||'').toLowerCase().includes(q));
  $('stkList').innerHTML=list.map(s=>{const low=s.track_stock&&s.qty<=3;
    return `<div class="row" style="cursor:pointer" onclick='stockHist(${s.product_id},"${esc(s.name_th)}")'><span class="em">${esc(s.emoji||'🥤')}</span><div class="nm"><b>${esc(s.name_th)}</b><small>${baht(s.price)}</small></div>
    <span class="qbadge ${low?'low':''}">${s.track_stock?s.qty:'∞'}</span>
    ${me.isManager?`<button class="mini" onclick='event.stopPropagation();priceSheet(${s.product_id},"${esc(s.name_th)}",${s.price})'>ราคา</button>`:''}
    <button class="mini" onclick='event.stopPropagation();restockSheet(${s.product_id},"${esc(s.name_th)}",${s.qty})'>เติม</button></div>`;}).join('')||`<div class="empty">${q?'ไม่พบสินค้า':'ยังไม่มีเครื่องดื่ม'}</div>`;
}
async function renderStock(){
  $('pgStock').innerHTML=`<button class="addbtn" style="border-style:solid;color:var(--green-2);border-color:var(--green-2)" onclick="printStockReport()">🖨️ รายงานสต็อก</button>
    <div style="font-size:12px;color:var(--muted);margin:-4px 2px 12px">เติมได้อย่างเดียว (ห้ามลด) · ลดผ่าน “ตัดชำรุด”${me.isOwner?' · เจ้าของ: ปรับลดได้ในหน้าเติม':''}</div>
    <div style="display:flex;gap:8px"><button class="mini" style="height:46px;flex:none" onclick="dayHist()">📅 รายวัน</button><input class="in" id="stkSearch" placeholder="🔍 ค้นหาเครื่องดื่ม" value="${esc(stkQ)}" oninput="stkQ=this.value;paintStockList()" autocomplete="off"></div>
    <div id="stkList"></div>
    <div class="sec-h">การเคลื่อนไหวล่าสุด</div><div id="moves"><div class="empty">กำลังโหลด…</div></div>`;
  paintStockList();
  const {data}=await sb.rpc('core_pos_movements_list',{p_venue:VENUE,p_limit:40});
  const kt={init:'สร้าง',restock:'เติม',adjust:'ปรับ',damage:'ชำรุด',sale:'ขาย',void:'คืน',requisition:'รับเบิก',issue:'จ่ายออก',transfer:'ย้าย'};
  $('moves').innerHTML=(data&&data.length)?data.map(m=>{const dt=new Date(m.created_at);const pos=Number(m.delta)>=0;
    return `<div class="mv"><span class="k">${kt[m.kind]||m.kind}</span><span>${esc(m.name_th)}<br><small style="color:var(--muted)">${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${m.reason?' · '+esc(m.reason):''}</small></span><span class="d ${pos?'pos':'neg'}">${pos?'+':''}${m.delta} → ${m.qty_after}</span></div>`;}).join(''):'<div class="empty">ยังไม่มีการเคลื่อนไหว</div>';
}
function priceSheet(pid,name,cur){
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>แก้ราคาขาย · ${esc(name)}</h3>
    <p style="font-size:12px;color:var(--muted);margin:0 0 12px">ราคานี้ใช้เฉพาะห้องอาหาร ไม่กระทบร้านอื่น</p>
    <label class="fld">ราคาขาย (บาท)</label>
    <input class="in" id="npPrice" type="number" inputmode="decimal" value="${cur}" style="margin-bottom:14px">
    <button class="btn" onclick="doPrice(${pid})">บันทึกราคา</button>
    <button class="btn" style="background:none;color:var(--muted)" onclick="closeModal()">ยกเลิก</button></div></div>`;
}
async function doPrice(pid){
  const p=Number($('npPrice').value);
  if(!(p>=0)){toast('ใส่ราคาให้ถูกต้อง');return;}
  const {error}=await sb.rpc('core_rest_drink_price',{p_emp:me.id,p_product:pid,p_price:p});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  closeModal();toast('แก้ราคาแล้ว ✓');await refreshDrinks();renderStock();
}
function restockSheet(pid,name,cur){
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet"><h3>เติมสต็อก · ${esc(name)}</h3>
    <label class="fld">จำนวน (สต็อกตอนนี้ ${cur})${me.isOwner?' — บวก = เติม · ติดลบ = ลด':''}</label><input class="in" id="rQty" type="number" inputmode="numeric" placeholder="${me.isOwner?'เช่น 24 หรือ -5':'เช่น 24'}">
    <label class="fld">หมายเหตุ</label><input class="in" id="rReason" placeholder="เช่น รับของจากซัพ">
    <button class="btn" onclick="doRestock(${pid},${cur})">${me.isOwner?'เติม / ลด':'เติมสต็อก'}</button>

async function stockHist(pid,name){
  const vcode='REST';
  const {data,error}=await sb.rpc('core_pos_product_history',{p_emp:me.id,p_venue:vcode,p_product:pid});
  if(error){toast(error.message||'โหลดไม่สำเร็จ');return;}
  const list=data||[];
  const kt={init:'สร้าง',restock:'เติม',adjust:'ปรับ',damage:'ชำรุด',sale:'ขาย',void:'คืน/ยกเลิก',requisition:'รับเบิก',issue:'จ่ายออก',purchase:'ซื้อเข้า',transfer:'ย้าย'};
  const days=new Map();
  list.forEach(m=>{const d=new Date(m.at).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
    if(!days.has(d))days.set(d,{inn:0,out:0,last:m.after});
    const o=days.get(d);const x=Number(m.delta);
    if(x>0)o.inn+=x;else o.out+=-x;});
  const dayRows=[...days.entries()].map(([d,o])=>`<tr>
    <td style="text-align:left">${d}</td>
    <td style="color:var(--ok);font-weight:${o.inn?'700':'400'}">${o.inn?'+'+o.inn:'–'}</td>
    <td style="color:var(--danger);font-weight:${o.out?'700':'400'}">${o.out?'−'+o.out:'–'}</td>
    <td style="background:#eef5f0"><b>${o.last??''}</b></td></tr>`).join('');
  const detail=list.map(m=>{const dt=new Date(m.at);const pos=Number(m.delta)>=0;
    return `<div class="row"><div class="nm"><b>${kt[m.kind]||m.kind}</b><small>${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(m.by||'')}${m.reason?' · '+esc(m.reason):''}</small></div><b style="color:${pos?'var(--ok)':'var(--danger)'}">${pos?'+':''}${m.delta} → ${m.after}</b></div>`;}).join('');
  const cur=list.length?list[0].after:'–';
  $('pgStock').innerHTML=`<button class="mini" onclick="renderStock()">← สต็อก</button>
    <div class="sec-h" style="margin-top:12px">🕘 ประวัติ: ${esc(name)} <span style="font-weight:400;color:var(--muted);font-size:13px">· คงเหลือตอนนี้ <b style="color:var(--green-2)">${cur}</b></span></div>
    ${list.length?`<div style="overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:13px;padding:6px">
      <table style="border-collapse:collapse;width:100%;font-size:14px" class="histTb">
        <thead><tr><th style="text-align:left">วันที่</th><th>เข้า</th><th>ออก</th><th style="background:var(--green);color:#fff">คงเหลือ</th></tr></thead>
        <tbody>${dayRows}</tbody></table></div>
      <div style="font-size:12px;color:var(--muted);margin:8px 2px">เข้า = เบิกเข้า/เติม · ออก = ขาย/ชำรุด · “–” = ไม่มี</div>
      <button class="mini" onclick="document.getElementById('shDetail').classList.toggle('hidden')">🔍 ดูละเอียดทีละรายการ</button>
      <div id="shDetail" class="hidden" style="margin-top:8px">${detail}</div>
      <style>.histTb th,.histTb td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:center;white-space:nowrap}.histTb th{background:#f6f4ee;font-size:12px}</style>`
    :'<div class="empty">ยังไม่มีการเคลื่อนไหว</div>'}`;
}
async function doRestock(pid,cur){const q=Number($('rQty').value);
  if(!q){toast('ใส่จำนวน');return;}
  if(q>0){
    const {error}=await sb.rpc('core_pos_restock_pin',{p_emp:me.id,p_venue:VENUE,p_product:pid,p_delta:q,p_reason:$('rReason').value.trim()||null});
    if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('เติมสต็อกแล้ว +'+q);await refreshDrinks();renderStock();return;
  }
  if(!me.isOwner){toast('ลดสต็อกได้เฉพาะเจ้าของ');return;}
  const nw=(Number(cur)||0)+q;
  if(nw<0){toast('ลดเกินที่มี (ตอนนี้เหลือ '+cur+')');return;}
  if(!confirm('ลด '+(-q)+' ชิ้น → เหลือ '+nw+'?'))return;
  const {error}=await sb.rpc('core_pos_set_stock_owner',{p_emp:me.id,p_venue:VENUE,p_product:pid,p_qty:nw,p_reason:$('rReason').value.trim()||('เจ้าของลดสต็อก '+q)});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('ลดสต็อกแล้ว '+q);await refreshDrinks();renderStock();}
async function doSetStock(pid){
  const q=Number($('oQty').value);if(!(q>=0)){toast('ใส่จำนวน (0 ขึ้นไป)');return;}
  if(!confirm('ตั้งสต็อกเป็น '+q+'?'))return;
  const {error}=await sb.rpc('core_pos_set_stock_owner',{p_emp:me.id,p_venue:VENUE,p_product:pid,p_qty:q,p_reason:'เจ้าของปรับสต็อก'});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}closeModal();toast('ตั้งสต็อกแล้ว');await refreshDrinks();renderStock();}

        <div><b>ขอจาก ${srcTxt}</b><small style="color:var(--muted);display:block">${dt.toLocaleDateString('th-TH')} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</small></div>
        <span class="pill ${r.status==='pending'?'pending':r.status==='confirmed'?'approved':'rejected'}">${st}</span></div>
      ${rowsHtml}${recv}</div>`;}).join(''):'<div class="empty">ยังไม่มีคำขอ</div>';
}
async function recvOk(reqId){
  if(!confirm('ยืนยันว่าได้รับของครบถูกต้อง?'))return;
  const {error}=await sb.rpc('core_req_receive',{p_emp:me.id,p_req:reqId,p_ok:true,p_note:null,p_photo:null});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}toast('ยืนยันรับของแล้ว ✓');loadReqList();
}
function recvIssue(reqId){
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>⚠️ แจ้งปัญหาการรับของ</h3>
    <label class="fld">ปัญหาที่พบ *</label><input class="in" id="riNote" placeholder="เช่น ได้ไม่ครบ / ของแตก / ผิดรายการ">
    <label class="fld">รูปถ่าย (ถ้ามี)</label><input class="in" id="riPhoto" type="file" accept="image/*" capture="environment">
    <button class="btn" onclick="sendIssue('${reqId}')">ส่งแจ้ง Warehouse</button>
    <button class="ghost" onclick="closeModal()">ยกเลิก</button></div></div>`;
}
async function sendIssue(reqId){
  const note=$('riNote').value.trim();if(!note){toast('ระบุปัญหาที่พบ');return;}
  let photo=null;const f=$('riPhoto').files&&$('riPhoto').files[0];
  if(f){const path='r'+Date.now()+'.jpg';
    const {error:ue}=await sb.storage.from('req-photos').upload(path,f,{contentType:f.type||'image/jpeg'});
    if(!ue)photo=sb.storage.from('req-photos').getPublicUrl(path).data.publicUrl;}
  const {error}=await sb.rpc('core_req_receive',{p_emp:me.id,p_req:reqId,p_ok:false,p_note:note,p_photo:photo});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  closeModal();toast('แจ้งปัญหาไปที่ Warehouse แล้ว');loadReqList();
}

/* ===== ตัดชำรุด ===== */
async function renderDamage(){
  const opts=drinks.map(p=>`<option value="${p.product_id}">${esc(p.name_th)} (เหลือ ${p.qty})</option>`).join('');
  const {data}=await sb.rpc('core_pos_damage_list',{p_venue:VENUE});
  const list=(data&&data.length)?data.map(d=>{
    const dt=new Date(d.created_at);const canAct=me.isManager&&d.status==='pending';
    return `<div class="row"><div class="nm"><b>${esc(d.name_th)} × ${d.qty}</b><small>${esc(d.requester||'')} · ${dt.toLocaleDateString('th-TH')} ${d.reason?'· '+esc(d.reason):''}</small></div>
      <span class="pill ${d.status}">${d.status==='pending'?'รออนุมัติ':d.status==='approved'?'อนุมัติแล้ว':'ปฏิเสธ'}</span>
      ${canAct?`<button class="mini" style="color:var(--ok)" onclick="dmgApprove('${d.id}')">อนุมัติ</button><button class="mini" style="color:var(--danger)" onclick="dmgReject('${d.id}')">ปฏิเสธ</button>`:''}</div>`;
  }).join(''):'<div class="empty">ยังไม่มีรายการ</div>';
  $('pgDamage').innerHTML=`<div class="row" style="flex-direction:column;align-items:stretch;gap:10px">
    <div style="margin:0"><label class="fld">สินค้าที่จะตัดชำรุด</label><select class="in" id="dProd">${opts}</select></div>
    <div class="g2"><div style="margin:0"><label class="fld">จำนวน</label><input class="in" id="dQty" type="number" inputmode="numeric" value="1"></div>
    <div style="margin:0"><label class="fld">เหตุผล</label><input class="in" id="dReason" placeholder="เช่น แตก/หมดอายุ"></div></div>
    <button class="btn" style="margin:0" onclick="dmgRequest()">ขอตัดชำรุด</button></div>
    <div style="font-size:12px;color:var(--muted);margin:8px 2px">${me.isManager?'คุณเป็นผู้จัดการ อนุมัติได้':'รายการจะถูกตัดสต็อกเมื่อผู้จัดการอนุมัติ'}</div>
    <div class="sec-h">รายการตัดชำรุด</div>${list}`;
}
async function dmgRequest(){const pid=Number($('dProd').value),q=Number($('dQty').value);if(!(q>0)){toast('ใส่จำนวน');return;}
  const {error}=await sb.rpc('core_pos_damage_request',{p_emp:me.id,p_venue:VENUE,p_product:pid,p_qty:q,p_reason:$('dReason').value.trim()||null});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}toast('ส่งคำขอแล้ว รออนุมัติ');renderDamage();}
async function dmgApprove(id){if(!confirm('อนุมัติตัดชำรุด? สต็อกจะถูกลดจริง'))return;
  const {error}=await sb.rpc('core_pos_damage_approve',{p_emp:me.id,p_damage:id});if(error){toast(error.message||'ไม่สำเร็จ');return;}
  toast('อนุมัติแล้ว');await refreshDrinks();renderDamage();}
async function dmgReject(id){const {error}=await sb.rpc('core_pos_damage_reject',{p_emp:me.id,p_damage:id});if(error){toast('ไม่สำเร็จ');return;}toast('ปฏิเสธแล้ว');renderDamage();}

/* ===== ยอดขาย ===== */
async function voidBill(billNo){
  const reason=prompt('เหตุผลที่ยกเลิกบิล '+billNo+'?\n(ระบบคืนสต็อกเครื่องดื่ม + ถอนยอดจากรายงาน)');
  if(reason===null)return;
  if(!reason.trim()){toast('ต้องระบุเหตุผล');return;}
  if(!confirm('ยืนยันยกเลิกบิล '+billNo+'? ย้อนกลับไม่ได้'))return;
  const {error}=await sb.rpc('core_rest_bill_void',{p_emp:me.id,p_bill:billNo,p_reason:reason.trim()});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  toast('ยกเลิกบิลแล้ว ✓');loadReport();
}
async function renderReport(){
  const today=new Date().toISOString().slice(0,10);
  $('pgReport').innerHTML=`<div class="g2" style="align-items:end"><div style="flex:1"><label class="fld">วันที่</label><input class="in" id="rDate" type="date" value="${today}" onchange="loadReport()"></div>
    <button class="mini" style="height:46px" onclick="printSalesReport()">🖨️ รายงานยอดขาย</button></div>
    <div id="repBody" style="margin-top:12px"><div class="empty">กำลังโหลด…</div></div>`;
  loadReport();
}
async function loadReport(){
  const d=$('rDate').value;
  const {data,error}=await sb.rpc('core_rest_report',{p_date:d});
  if(error||!data){$('repBody').innerHTML='<div class="empty">โหลดไม่สำเร็จ</div>';return;}
  const s=data.summary||{count:0,total:0,cash:0,transfer:0};
  const top=(data.top||[]).map((t,i)=>`<div class="row"><span style="color:var(--muted);width:20px">${i+1}</span><div class="nm"><b>${esc(t.name)}</b></div><span style="color:var(--muted)">${t.qty}</span><b style="color:var(--green-2)">${baht(t.total)}</b></div>`).join('')||'<div class="empty">ไม่มีข้อมูล</div>';
  const bills=(data.bills||[]).map(b=>{const dt=new Date(b.at);
    return `<div class="row"><div class="nm"><b>${esc(b.bill_no)}</b><small>${esc(b.tbl||'')} · ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} · ${esc(b.by||'')} · ${b.pay==='transfer'?'โอน':'เงินสด'}</small></div><b>${baht(b.total)}</b>
      <button class="mini" onclick='reprintBill(${JSON.stringify(b)})'>พิมพ์</button>
      ${me.isManager?`<button class="mini" style="color:var(--danger)" onclick='voidBill("${esc(b.bill_no)}")'>🗑</button>`:''}</div>`;}).join('')||'<div class="empty">ยังไม่มีบิล</div>';
  $('repBody').innerHTML=`<div class="stat"><div><b>${s.count}</b><span>บิล</span></div><div><b>${baht(s.total)}</b><span>ยอดขาย</span></div><div><b>${baht(s.cash)}</b><span>เงินสด</span></div><div><b>${baht(s.transfer)}</b><span>โอน</span></div></div>
    <div class="sec-h">เมนูขายดี</div>${top}<div class="sec-h">บิลทั้งหมด</div>${bills}`;
}
function reprintBill(b){
  const items=(b.items||[]).map(it=>({name:it.name,qty:it.qty,price:it.unit,total:it.total}));
  showReceipt({bill_no:b.bill_no,total:b.total,pay:b.pay,items,table:b.tbl});
}

/* ===== พิมพ์ ===== */
/* พิมพ์แบบเปิดหน้าต่างใหม่ — กันหน้าขาว */
function printDoc(title,inner,receipt){
  const win=window.open('','_blank');
  if(!win){toast('เบราว์เซอร์บล็อกหน้าต่างพิมพ์ — อนุญาต popup ให้เว็บนี้');return;}
  win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>${title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Sarabun',sans-serif;color:#000;margin:16px;${receipt?'width:76mm;font-size:13px':''}}
  h2{text-align:center;margin:0 0 2px}.sub{text-align:center;color:#555;margin-bottom:12px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  th{background:#f0efe8}.r{text-align:right}.c{text-align:center}
  .cards{display:flex;gap:10px;margin-bottom:12px}.cards div{flex:1;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}.cards b{display:block;font-size:18px}
  .billhd{background:#f6f4ee;font-weight:700}
  .rc .ch2{text-align:center;font-weight:700;font-size:16px}.rc .cc{text-align:center;font-size:12px;color:#555;margin-bottom:6px}
  .rc .dash{border-top:1px dashed #999;margin:7px 0}.rc .rr{display:flex;justify-content:space-between;font-size:13px;margin:2px 0}
  .rc .tt{display:flex;justify-content:space-between;font-weight:700;font-size:15px}
  .row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #ddd;font-size:13px}.row .nm{flex:1}.row small{color:#666;display:block;font-size:11px}
  .stat{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}.stat>div{flex:1;min-width:110px;border:1px solid #ccc;border-radius:8px;padding:8px;text-align:center}.stat b{display:block;font-size:17px}.stat span{font-size:11px;color:#555}
  .sec-h{font-weight:700;margin:14px 0 6px}
  button,.mini,.addbtn,.chips,.g2,input,select{display:none!important}
  </style></head><body>${inner}`+'<scr'+'ipt>'+`window.onload=function(){setTimeout(function(){window.print();},250);}`+'</scr'+'ipt>'+`</body></html>`);
  win.document.close();
}
function printPage(){const el=document.querySelector('.content > div:not(.hidden)');if(!el)return;
  printDoc('ห้องอาหาร · '+$('pageTitle').textContent,`<h2>ห้องอาหาร Royal Creek</h2><div class="sub">${esc($('pageTitle').textContent)} · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>`+el.innerHTML);}
function doPrint(id){const el=$(id);printDoc(document.title,el.innerHTML);el.innerHTML='';}
function printStockReport(){
  const rows=drinks.map((p,i)=>{const st=p.qty<=0?['หมด','#a3352d']:p.qty<=3?['ใกล้หมด','#b8860b']:['ปกติ','#1b7a4a'];
    return `<tr><td class="c">${i+1}</td><td>${esc(p.emoji||'')} ${esc(p.name_th)}</td><td class="r">${baht(p.price)}</td><td class="r">${p.qty}</td><td style="color:${st[1]}">${st[0]}</td></tr>`;}).join('');
  $('printArea').innerHTML=`<h2>ห้องอาหาร Royal Creek</h2><div class="sub">รายงานสต็อกเครื่องดื่ม · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <table><thead><tr><th class="c">#</th><th>สินค้า</th><th class="r">ราคา</th><th class="r">สต็อก</th><th>สถานะ</th></tr></thead><tbody>${rows}</tbody></table>`;
  doPrint('printArea');
}
async function printSalesReport(){
  const d=$('rDate').value;toast('กำลังสร้างรายงาน…');
  const {data,error}=await sb.rpc('core_rest_report',{p_date:d});
  if(error||!data){toast('โหลดไม่สำเร็จ');return;}
  const s=data.summary||{};let body='';
  (data.bills||[]).slice().reverse().forEach((b,i)=>{const dt=new Date(b.at);
    body+=`<tr class="billhd"><td class="c">${i+1}</td><td>${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</td><td>บิล ${esc(b.bill_no)} · ${esc(b.tbl||'')} · ${esc(b.by||'')}</td><td class="c">${b.pay==='transfer'?'โอน':'เงินสด'}</td><td class="r">${baht(b.total)}</td></tr>`;
    (b.items||[]).forEach(it=>{body+=`<tr><td></td><td></td><td>— ${esc(it.name)}</td><td class="c">${it.qty} × ${baht(it.unit)}</td><td class="r">${baht(it.total)}</td></tr>`;});
  });
  $('printArea').innerHTML=`<h2>ห้องอาหาร Royal Creek</h2><div class="sub">รายงานยอดขาย ${d} · พิมพ์ ${new Date().toLocaleString('th-TH')}</div>
    <div class="cards"><div><b>${baht(s.total)}</b>ยอดขายรวม</div><div><b>${s.count||0}</b>จำนวนบิล</div><div><b>${baht(s.cash)}</b>เงินสด</div><div><b>${baht(s.transfer)}</b>เงินโอน</div></div>
    <table><thead><tr><th class="c">#</th><th>เวลา</th><th>รายการ</th><th class="c">จำนวน</th><th class="r">ยอด</th></tr></thead><tbody>${body||'<tr><td colspan="5" class="c">ไม่มีบิล</td></tr>'}</tbody></table>`;
  doPrint('printArea');
}

/* ===== จัดการเมนู ===== */
function openManage(){
  const catopt='<option value="">ไม่มีหมวด</option>'+cats.map(c=>`<option value="${c.id}">${esc(c.name_th)}</option>`).join('');
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>จัดการเมนู</h3>
    <label class="fld">เพิ่มเมนูใหม่</label>
    <input class="in" id="miName" placeholder="ชื่อเมนู เช่น ข้าวผัดกุ้ง">
    <div class="g2"><input class="in" id="miEmoji" placeholder="🍤" maxlength="4"><input class="in" id="miPrice" type="number" placeholder="ราคา"></div>
    <select class="in" id="miCat">${catopt}</select>
    <button class="btn" onclick="saveMenu()">เพิ่มเมนู</button>
    <div class="g2" style="margin-top:12px"><button class="mini" onclick="addCatPrompt()">＋ เพิ่มหมวด</button><button class="mini" onclick="addTablePrompt()">＋ เพิ่มโต๊ะ</button></div>
    <div class="sec-h">เมนูทั้งหมด (แตะเพื่อแก้)</div>
    ${menu.map(m=>`<div class="row"><span class="em">${esc(m.emoji||'🍽')}</span><div class="nm"><b>${esc(m.name_th)}</b><small>${baht(m.price)}</small></div><button class="mini" onclick='editMenu(${JSON.stringify(m)})'>แก้</button></div>`).join('')||'<div class="empty">ยังไม่มีเมนู</div>'}
    <button class="ghost" onclick="closeModal()">ปิด</button></div></div>`;
}
async function saveMenu(){const n=$('miName').value.trim();if(!n){toast('ใส่ชื่อเมนู');return;}
  const {error}=await sb.rpc('core_rest_menu_save',{p_emp:me.id,p_id:null,p_name:n,p_emoji:$('miEmoji').value.trim(),p_cat:$('miCat').value?Number($('miCat').value):null,p_price:Number($('miPrice').value)||0,p_active:true});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  await loadData();toast('เพิ่มเมนูแล้ว');openManage();}
function editMenu(m){
  const catopt='<option value="">ไม่มีหมวด</option>'+cats.map(c=>`<option value="${c.id}" ${m.category_id===c.id?'selected':''}>${esc(c.name_th)}</option>`).join('');
  $('modal').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <h3>แก้เมนู</h3>
    <input class="in" id="miName" value="${esc(m.name_th)}">
    <div class="g2"><input class="in" id="miEmoji" value="${esc(m.emoji||'')}" maxlength="4"><input class="in" id="miPrice" type="number" value="${m.price}"></div>
    <select class="in" id="miCat">${catopt}</select>
    <label class="togg"><input type="checkbox" id="miActive" ${m.active?'checked':''}> เปิดขาย</label>
    <button class="btn" onclick="saveEditMenu(${m.id})">บันทึก</button><button class="ghost" onclick="openManage()">← กลับ</button></div></div>`;
}
async function saveEditMenu(id){
  const {error}=await sb.rpc('core_rest_menu_save',{p_emp:me.id,p_id:id,p_name:$('miName').value.trim(),p_emoji:$('miEmoji').value.trim()||null,p_cat:$('miCat').value?Number($('miCat').value):null,p_price:Number($('miPrice').value)||0,p_active:$('miActive').checked});
  if(error){toast(error.message||'ไม่สำเร็จ');return;}
  await loadData();toast('บันทึกแล้ว');openManage();}
async function addCatPrompt(){const n=prompt('ชื่อหมวดเมนู');if(!n||!n.trim())return;
  const {error}=await sb.rpc('core_rest_cat_add',{p_emp:me.id,p_name:n.trim()});if(error){toast('ไม่สำเร็จ');return;}
  await loadData();toast('เพิ่มหมวดแล้ว');openManage();}
async function addTablePrompt(){const n=prompt('ชื่อโต๊ะ เช่น โต๊ะ 11');if(!n||!n.trim())return;
  const {error}=await sb.rpc('core_rest_table_add',{p_emp:me.id,p_name:n.trim()});if(error){toast('ไม่สำเร็จ');return;}toast('เพิ่มโต๊ะแล้ว');closeModal();if(page==='tables')renderTables();}

async function boot(){const {data}=await sb.auth.getSession();if(data&&data.session){if(await enterAsAuth(data.session.user))return;}
  try{const st=JSON.parse(sessionStorage.getItem('ryc_staff')||'null');if(st&&st.id){if(await enterAsStaff(st.id))return;}}catch(e){}
  loadStaff();}
boot();
</script>
